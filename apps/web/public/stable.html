      const configured = Number(localStorage.getItem("meeting.localPushToTalkMaxMs") || "600000");
      return Number.isFinite(configured) ? Math.max(30000, Math.min(1800000, configured)) : 600000;
    }

    async function sendPeerAudioChunk(blob, speakerLabel, clientStartedAt = 0, clientStoppedAt = 0) {
      if (!api) return;
      const extension = blob.type.includes("mp4") ? "mp4" : "webm";
      try {
        const params = new URLSearchParams({
          extension,
          speaker: speakerLabel || "Guest",
          speakerId: `guest-${String(speakerLabel || "guest").toLowerCase().replace(/[^a-z0-9_-]+/g, "-").replace(/^-+|-+$/g, "") || "speaker"}`,
          meetingId,
          client: "stable-webrtc-peer-v1"
        });
        if (clientStartedAt) params.set("clientStartedAt", String(clientStartedAt));
        if (clientStoppedAt) params.set("clientStoppedAt", String(clientStoppedAt));
        await fetch(`${api}/audio/chunk?${params.toString()}`, {
          method: "POST",
          headers: { "Content-Type": blob.type || "application/octet-stream" },
          body: await blob.arrayBuffer()
        });
      } catch (error) {
        await postRealtimeTrace("error", "Peer STT audio chunk failed", { speakerLabel, error: error?.message || String(error) });
      }
    }

    async function sendAudioChunk(blob, clientStartedAt = 0, clientStoppedAt = 0) {
      if (peerOnly || !api) return;
      if (Date.now() < localSttSuppressUploadsUntil) {
        await postRealtimeTrace("debug", "Skipped local STT upload during local speech output", { bytes: blob.size });
        return;
      }
      const extension = blob.type.includes("mp4") ? "mp4" : "webm";
      try {
        const params = new URLSearchParams({
          extension,
          speaker: "Host",
          client: "stable-vad-v1"
        });
        if (clientStartedAt) params.set("clientStartedAt", String(clientStartedAt));
        if (clientStoppedAt) params.set("clientStoppedAt", String(clientStoppedAt));
        await fetch(`${api}/audio/chunk?${params.toString()}`, {
          method: "POST",
          headers: { "Content-Type": blob.type || "application/octet-stream" },
          body: await blob.arrayBuffer()
        });
      } catch (error) {
        await postRealtimeTrace("error", "Local STT audio chunk failed", { error: error?.message || String(error) });
      }
    }

    async function handleLocalPiAgentUpdate(event) {
      if (realtimeMuted) return;
      const message = localSpeechTextForPiAgentUpdate(event);
      if (!message) return;
      const direct = isVoiceAgentDirectMessage(event);
      const segmented = direct || (event?.type === "agent.message" && event.surface === "status");
      const queued = segmented
        ? enqueueLocalVoiceSegments(message, { clearExisting: direct })
        : enqueueLocalVoiceMessage(message, { clearExisting: direct });
      await postRealtimeTrace("agent", "Queued local TTS for Pi/Codex message", { eventId: event.id, direct, queuedSegments: queued });
    }

    function enqueueLocalVoiceMessage(message, options = {}) {
      const text = clipText(sanitizeSpokenText(String(message || "")).trim(), options.maxChars || 700);
      if (!text || realtimeMuted) return 0;
      if (options.clearExisting) clearLocalSpeechQueue();
      localSpeechQueue.push(createLocalSpeechQueueItem(text));
      warmLocalSpeechQueue();
      void playLocalSpeechQueue();
      return 1;
    }

    function enqueueLocalVoiceSegments(message, options = {}) {
      const text = sanitizeSpokenText(String(message || "")).trim();
      if (!text || realtimeMuted) return 0;
      if (options.clearExisting) clearLocalSpeechQueue();
      const maxChars = Number(options.maxChars || 640);
      const extraction = extractSpeakableSegments(text, true, { first: true });
      const extracted = extraction.segments.map((segment) => segment.text);
      const tail = text.slice(Math.min(extraction.consumed, text.length)).trim();
      const segments = (extracted.length ? extracted : [text]).concat(tail && tail !== text ? [tail] : []);
      let queued = 0;
      for (const segment of segments.flatMap((segment) => splitLongSpeechSegment(segment, maxChars))) {
        const spoken = sanitizeSpokenText(segment).trim();
        if (!isUsefulSpeechSegment(spoken)) continue;
        localSpeechQueue.push(createLocalSpeechQueueItem(clipText(spoken, maxChars)));
        queued += 1;
      }
      if (!queued) return 0;
      warmLocalSpeechQueue();
      void playLocalSpeechQueue();
      return queued;
    }

    function createLocalSpeechQueueItem(text) {
      return {
        text,
        generation: 0,
        synthesis: null,
        fallbackNoted: false
      };
    }

    function broadcastAssistantSpeechToHumanPeers(text) {
      const spoken = sanitizeSpokenText(String(text || "")).trim();
      if (!spoken || !peerRoom?.broadcastSpeech) return;
      const sent = peerRoom.broadcastSpeech(spoken);
      if (sent) void postRealtimeTrace("agent", "Broadcast assistant speech to human peers", { peers: sent, textChars: spoken.length });
    }

    async function broadcastAssistantAudioToHumanPeers(blob) {
      if (!blob || !peerRoom?.broadcastAudioBlob) return 0;
      const sent = await peerRoom.broadcastAudioBlob(blob, "assistant.audio");
      if (sent) void postRealtimeTrace("agent", "Broadcast assistant TTS audio to human peers", { peers: sent, bytes: blob.size, mimeType: blob.type });
      return sent;
    }

    function broadcastHostSpeechToHumanPeers(text) {
      const spoken = sanitizeSpokenText(String(text || "")).trim();
      if (!spoken || !peerRoom?.broadcastSpeech) return;
      const sent = peerRoom.broadcastSpeech(spoken, "host.speech");
      if (sent) void postRealtimeTrace("agent", "Broadcast host speech transcript to human peers", { peers: sent, textChars: spoken.length });
    }

    function base64ToBlob(base64, mimeType = "audio/mpeg") {
      const binary = window.atob(base64);
      const bytes = new Uint8Array(binary.length);
      for (let index = 0; index < binary.length; index += 1) bytes[index] = binary.charCodeAt(index);
      return new Blob([bytes], { type: mimeType });
    }

    async function playPeerAssistantAudioBlob(base64Audio, mimeType, startedAt = Date.now()) {
      const blob = base64ToBlob(base64Audio, mimeType);
      const url = URL.createObjectURL(blob);
      const audio = new Audio(url);
      try {
        peerRoom?.muteLocalMicForRelay?.(Math.min(30000, Math.max(4000, Math.round(blob.size / 24))));
        await audio.play();
        void postRealtimeTrace("agent", "Playing relayed assistant TTS audio", { bytes: blob.size, mimeType, transferMs: Date.now() - startedAt });
      } catch (error) {
        enableAudioButton.hidden = false;
        speakPeerAssistantText("Audio is ready. Please press Enable guest audio.");
        void postRealtimeTrace("error", "Relayed assistant TTS audio playback failed", { error: error?.message || String(error), bytes: blob.size, mimeType });
      } finally {
        audio.onended = () => URL.revokeObjectURL(url);
        window.setTimeout(() => URL.revokeObjectURL(url), 60000);
      }
    }

    function unlockPeerAudio(withTest = false) {
      peerAudioUnlocked = true;
      enableAudioButton.hidden = true;
      try {
        window.speechSynthesis?.resume?.();
        if (withTest && window.speechSynthesis) {
          const utterance = new SpeechSynthesisUtterance("Guest audio enabled.");
          utterance.lang = "en-US";
          window.speechSynthesis.speak(utterance);
        }
      } catch {}
      void postRealtimeTrace("agent", "Guest audio output unlocked", { withTest });
    }

    function speakPeerAssistantText(text) {
      const spoken = sanitizeSpokenText(String(text || "")).trim();
      if (!spoken || !window.speechSynthesis) return;
      if (!peerAudioUnlocked && peerOnly) {
        enableAudioButton.hidden = false;
        void postRealtimeTrace("debug", "Guest speech relay waiting for audio unlock", { textChars: spoken.length });
      }
      try {
        window.speechSynthesis.cancel();
        const utterance = new SpeechSynthesisUtterance(clipText(spoken, 700));
        utterance.lang = "en-US";
        utterance.rate = 1;
        const estimatedMs = Math.min(18000, Math.max(2500, spoken.length * 65));
        peerRoom?.muteLocalMicForRelay?.(estimatedMs + 1200);
        utterance.onend = () => peerRoom?.muteLocalMicForRelay?.(500);
        utterance.onerror = () => peerRoom?.muteLocalMicForRelay?.(500);
        window.speechSynthesis.speak(utterance);
        void postRealtimeTrace("agent", "Speaking assistant audio relayed from host", { textChars: spoken.length, mutedGuestMicMs: estimatedMs + 1200 });
      } catch (error) {
        void postRealtimeTrace("error", "Guest browser speech relay failed", { error: error?.message || String(error) });
      }
    }

    function warmLocalSpeechQueue() {
      const maxPrefetch = localTtsProvider === "qwen3-tts" ? 2 : 1;
      let inFlight = 0;
      for (const item of localSpeechQueue) {
        if (item.synthesis) inFlight += 1;
      }
      for (const item of localSpeechQueue) {
        if (inFlight >= maxPrefetch) break;
        if (!item.synthesis) {
          item.generation = nextLocalSpeechGeneration();
          item.synthesis = prepareLocalSpeechAudio(item.text, item.generation, item).catch((error) => ({ ok: false, error, item }));
          inFlight += 1;
        }
      }
    }

    async function playLocalSpeechQueue() {
      if (localSpeechQueuePlaying) return;
      localSpeechQueuePlaying = true;
      try {
        while (localSpeechQueue.length && joined && usesLocalSpeechOutput() && !realtimeMuted) {
          warmLocalSpeechQueue();
          const item = localSpeechQueue.shift();
          if (!item) continue;
          warmLocalSpeechQueue();
          if (!item.synthesis) {
            item.generation = nextLocalSpeechGeneration();
            item.synthesis = prepareLocalSpeechAudio(item.text, item.generation, item).catch((error) => ({ ok: false, error, item }));
          }
          await playPreparedLocalSpeechItem(item);
          warmLocalSpeechQueue();
        }
      } finally {
        localSpeechQueuePlaying = false;
        if (localSpeechQueue.length && joined && usesLocalSpeechOutput() && !realtimeMuted) void playLocalSpeechQueue();
      }
    }

    function clearLocalSpeechQueue() {
      for (const item of localSpeechQueue) item.controller?.abort();
      localSpeechQueue = [];
      codexStreamingSpeech.clear();
    }

    function nextLocalSpeechGeneration() {
      const queuedGenerations = localSpeechQueue.map((item) => Number(item.generation || 0));
      return Math.max(localSpeechGeneration, ...queuedGenerations) + 1;
    }

    async function prepareLocalSpeechAudio(text, generation, item = {}) {
      item.controller = new AbortController();
      const startedAt = Date.now();
      if (localStreamingTts) {
        try {
          return await prepareLocalSpeechStream(text, generation, item.controller.signal, startedAt);
        } catch (error) {
          if (!item.fallbackNoted) {
            item.fallbackNoted = true;
            await postRealtimeTrace("error", "Streaming local TTS prefetch failed; falling back to full audio response", { error: error?.message || String(error), provider: localTtsProvider });
          }
        }
      }
      return await prepareLocalSpeechBlob(text, generation, item.controller.signal, startedAt);
    }

    async function playPreparedLocalSpeechItem(item) {
      const generation = item.generation || (localSpeechGeneration + 1);
      localSpeechGeneration = generation;
      localSpeechCurrentItem = item;
      renderStatus(item.synthesis ? "local voice preparing; listening" : "preparing local voice; listening", "ready");
      try {
        const prepared = await item.synthesis;
        if (!prepared?.ok) throw prepared?.error || new Error("local TTS preparation failed");
        if (prepared.generation !== localSpeechGeneration) return;
        if (!await waitForLocalSpeechPlaybackTurn(generation)) return;
        if (prepared.kind === "blob") void broadcastAssistantAudioToHumanPeers(prepared.blob);
        else broadcastAssistantSpeechToHumanPeers(item.text);
        pauseLocalSttForSpeech();
        stopLocalSpeechAudio();
        if (prepared.kind === "stream") {
          await playPreparedLocalSpeechStream(prepared);
        } else {
          await playLocalSpeechBlob(prepared.blob, prepared.generation);
        }
      } catch (error) {
        if (generation !== localSpeechGeneration) return;
        await postRealtimeTrace("error", "Local TTS failed; browser speech fallback is disabled", { error: error?.message || String(error) });
        renderStatus("local TTS unavailable; speech skipped", "ready");
        resumeLocalSttAfterSpeech();
      } finally {
        if (localSpeechCurrentItem === item) localSpeechCurrentItem = null;
      }
    }

    async function speakLocalVoiceMessage(message) {
      localSpeechGeneration += 1;
      const generation = localSpeechGeneration;
      const text = clipText(message, 360);
      renderStatus("preparing local voice; listening", "ready");
      try {
        const prepared = await prepareLocalSpeechAudio(text, generation, {});
        if (!await waitForLocalSpeechPlaybackTurn(generation)) return;
        if (prepared.kind === "blob") void broadcastAssistantAudioToHumanPeers(prepared.blob);
        else broadcastAssistantSpeechToHumanPeers(text);
        pauseLocalSttForSpeech();
        stopLocalSpeechAudio();
        if (prepared.kind === "stream") await playPreparedLocalSpeechStream(prepared);
        else await playLocalSpeechBlob(prepared.blob, prepared.generation);
      } catch (error) {
        if (generation !== localSpeechGeneration) return;
        await postRealtimeTrace("error", "Local TTS failed; browser speech fallback is disabled", { error: error?.message || String(error) });
        renderStatus("local TTS unavailable; speech skipped", "ready");
        resumeLocalSttAfterSpeech();
      }
    }

    async function prepareLocalSpeechBlob(text, generation, signal, startedAt = Date.now()) {
      const response = await fetch(`${api}/tts/synthesize`, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ text }),
        signal
      });
      if (!response.ok) {
        const body = await response.text();
        throw new Error(body || `local TTS returned ${response.status}`);
      }
      const blob = await response.blob();
      return { ok: true, kind: "blob", blob, generation, prepareMs: Date.now() - startedAt };
    }

    async function prepareLocalSpeechStream(text, generation, signal, startedAt = Date.now()) {
      const response = await fetch(`${api}/tts/stream`, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ text }),
        signal
      });
      if (!response.ok || !response.body) {
        const body = await response.text().catch(() => "");
        throw new Error(body || `streaming local TTS returned ${response.status}`);
      }
      return { ok: true, kind: "stream", response, generation, prepareMs: Date.now() - startedAt };
    }

    async function playPreparedLocalSpeechStream(prepared) {
      stopLocalSpeechAudio();
      const { response, generation } = prepared;
      const sampleRate = Number(response.headers.get("x-tts-sample-rate") || "24000") || 24000;
      const playback = createLocalSpeechStreamPlayback(sampleRate, generation);
      localSpeechStreamPlayback = playback;
      renderStatus("local voice streaming", "speaking");

      const reader = response.body.getReader();
      const decoder = new TextDecoder();
      let pending = "";
      let audioChunks = 0;
      try {
        await playback.context.resume();
        while (generation === localSpeechGeneration) {
          const { done, value } = await reader.read();
          if (done) break;
          pending += decoder.decode(value, { stream: true }).replace(/\r\n/g, "\n");
          let separator = pending.indexOf("\n\n");
          while (separator >= 0) {
            const block = pending.slice(0, separator);
            pending = pending.slice(separator + 2);
            const audioData = speechAudioDataFromSseBlock(block);
            if (audioData) {
              schedulePcmFloat32Speech(audioData, sampleRate, playback);
              audioChunks += 1;
            }
            separator = pending.indexOf("\n\n");
          }
        }
        if (pending.trim()) {
          const audioData = speechAudioDataFromSseBlock(pending);
          if (audioData) {
            schedulePcmFloat32Speech(audioData, sampleRate, playback);
            audioChunks += 1;
          }
        }
      } finally {
        reader.releaseLock();
      }

      if (!audioChunks) {
        if (localSpeechStreamPlayback === playback) localSpeechStreamPlayback = null;
        playback.stop();
        throw new Error("streaming local TTS produced no audio chunks");
      }
      await waitForStreamingSpeechTail(playback, generation);
      if (localSpeechStreamPlayback === playback) localSpeechStreamPlayback = null;
      playback.stop();
      if (generation === localSpeechGeneration) resumeLocalSttAfterSpeech();
    }

    function playLocalSpeechBlob(blob, generation) {
      return new Promise((resolve) => {
        stopLocalSpeechAudio();
        const url = URL.createObjectURL(blob);
        const audio = new Audio(url);
        localSpeechAudio = audio;
        localSpeechAudioUrl = url;
        let finished = false;
        const finish = () => {
          if (finished) return;
          finished = true;
          if (generation === localSpeechGeneration) resumeLocalSttAfterSpeech();
          if (localSpeechAudio === audio) {
            localSpeechAudio = null;
            localSpeechAudioUrl = null;
          }
          if (localSpeechFinishCurrent === finish) localSpeechFinishCurrent = null;
          URL.revokeObjectURL(url);
          resolve();
        };
        localSpeechFinishCurrent = finish;
        audio.onended = finish;
        audio.onerror = finish;
        renderStatus("local voice speaking", "speaking");
        void audio.play().then(() => {
          void postRealtimeTrace("latency", "local.tts.playback.start", {
            kind: "blob",
            generation,
            clientPlaybackStartedAt: Date.now()
          });
        }).catch((error) => {
          void postRealtimeTrace("error", "Local TTS playback failed", { error: error?.message || String(error) });
          finish();
        });
      });
    }

    function createLocalSpeechStreamPlayback(sampleRate, generation = 0) {
      const AudioContextCtor = window.AudioContext || window.webkitAudioContext;
      if (!AudioContextCtor) throw new Error("WebAudio is unavailable in this browser");
      const context = new AudioContextCtor({ sampleRate });
      const playback = {
        context,
        generation,
        nextStart: 0,
        playing: true,
        playbackStartTraced: false,
        sources: new Set(),
        stop() {
          playback.playing = false;
          playback.abortController?.abort();
          for (const source of playback.sources) {
            try {
              source.stop();
            } catch {}
          }
          playback.sources.clear();
          void context.close().catch(() => undefined);
        }
      };
      void context.resume?.().catch(() => undefined);
      playback.nextStart = context.currentTime + 0.035;
      return playback;
    }

    function speechAudioDataFromSseBlock(block) {
      const lines = String(block || "").split("\n").map((line) => line.replace(/\r$/, ""));
      const dataLines = lines.filter((line) => line.startsWith("data:")).map((line) => line.slice(5).trimStart());
      const rawData = (dataLines.length ? dataLines.join("\n") : lines.join("\n")).trim();
      if (!rawData || rawData === "[DONE]") return "";
      try {
        const parsed = JSON.parse(rawData);
        const payload = parsed?.data && typeof parsed.data === "object" ? parsed.data : parsed;
        if (payload?.type === "speech.audio.done" || parsed?.event === "speech.audio.done") return "";
        if (payload?.audio_data && (payload.type === "speech.audio.delta" || parsed?.event === "speech.audio.delta" || !payload.type)) {
          return String(payload.audio_data);
        }
      } catch {}
      return "";
    }

    function schedulePcmFloat32Speech(base64Audio, sampleRate, playback) {
      const samples = pcmFloat32FromBase64(base64Audio);
      if (!samples.length || !playback.playing) return;
      const audioBuffer = playback.context.createBuffer(1, samples.length, sampleRate);
      audioBuffer.copyToChannel(samples, 0);
      const source = playback.context.createBufferSource();
      source.buffer = audioBuffer;
      source.connect(playback.context.destination);
      source.onended = () => playback.sources.delete(source);
      playback.sources.add(source);
      void playback.context.resume?.().catch(() => undefined);
      const startAt = Math.max(playback.nextStart, playback.context.currentTime + 0.015);
      if (!playback.playbackStartTraced) {
        playback.playbackStartTraced = true;
        void postRealtimeTrace("latency", "local.tts.playback.start", {
          kind: "stream",
          generation: playback.generation,
          clientPlaybackStartedAt: Date.now(),
          audioContextCurrentTime: playback.context.currentTime,
          scheduledAt: startAt
        });
      }
      source.start(startAt);
      playback.nextStart = startAt + audioBuffer.duration;
    }

    function pcmFloat32FromBase64(base64Audio) {
      const binary = window.atob(base64Audio);
      const bytes = new Uint8Array(binary.length);
      for (let index = 0; index < binary.length; index += 1) {
        bytes[index] = binary.charCodeAt(index);
      }
      const sampleCount = Math.floor(bytes.byteLength / 4);
      const view = new DataView(bytes.buffer, bytes.byteOffset, bytes.byteLength);
      const samples = new Float32Array(sampleCount);
      for (let index = 0; index < sampleCount; index += 1) {
        samples[index] = view.getFloat32(index * 4, true);
      }
      return samples;
    }

    async function waitForStreamingSpeechTail(playback, generation) {
      while (generation === localSpeechGeneration && playback.playing && playback.context.currentTime < playback.nextStart + 0.08) {
        await waitMs(35);
      }
    }

    function waitMs(ms) {
      return new Promise((resolve) => window.setTimeout(resolve, ms));
    }

    async function waitForLocalSpeechPlaybackTurn(generation) {
      if (localCaptureMode() !== "auto-vad" || !usesLocalStt()) return true;
      let notedWait = false;
      const waitStartedAt = Date.now();
      while (generation === localSpeechGeneration && joined && usesLocalSpeechOutput() && !realtimeMuted) {
        if (!localShouldDeferSpeechPlayback()) return true;
        const waitedMs = Date.now() - waitStartedAt;
        if (waitedMs >= localUnconfirmedMicDeferMs()) {
          void postRealtimeTrace("agent", "Continuing local voice after unconfirmed mic activity", {
            level: currentLocalMicLevel(),
            waitedMs,
            maxWaitMs: localUnconfirmedMicDeferMs()
          });
          return true;
        }
        if (!notedWait) {
          notedWait = true;
          renderStatus("host still speaking; local voice waiting", "ready");
          void postRealtimeTrace("agent", "Local voice prepared but waiting for host speech to finish", {
            level: currentLocalMicLevel(),
            quietMs: localSpeechPlaybackQuietMs()
          });
        }
        await waitMs(80);
      }
      return false;
    }

    function localShouldDeferSpeechPlayback() {
      if (localCaptureMode() !== "auto-vad" || !localSttActive) return false;
      if (localPushToTalkActive) return true;
      if (localSttRecorder?.state === "recording") return true;
      const now = Date.now();
      const recentVoice = localSttLastVoiceAt > 0 && now - localSttLastVoiceAt < localSpeechPlaybackQuietMs();
      return recentVoice || currentLocalMicLevel() >= localVoiceThreshold();
    }

    function localUnconfirmedMicDeferMs() {
      const configured = Number(localStorage.getItem("meeting.localUnconfirmedMicDeferMs") || "1800");
      return Number.isFinite(configured) ? Math.max(0, Math.min(8000, configured)) : 1800;
    }

    function localSpeechPlaybackQuietMs() {
      const configured = Number(localStorage.getItem("meeting.localSpeechPlaybackQuietMs") || "650");
      return Number.isFinite(configured) ? Math.max(0, Math.min(3000, configured)) : 650;
    }

    function localSpeechAudioPlaying() {
      return Boolean(localSpeechStreamPlayback?.playing || (localSpeechAudio && !localSpeechAudio.paused && !localSpeechAudio.ended));
    }

    function stopLocalSpeechAudio() {
      if (localSpeechStreamPlayback) {
        localSpeechStreamPlayback.stop();
        localSpeechStreamPlayback = null;
      }
      if (localSpeechAudio) {
        localSpeechAudio.pause();
        localSpeechAudio.onended = null;
        localSpeechAudio.onerror = null;
        localSpeechAudio.removeAttribute("src");
        localSpeechAudio.load();
      }
      if (localSpeechFinishCurrent) {
        const finish = localSpeechFinishCurrent;
        localSpeechFinishCurrent = null;
        finish();
      } else {
        localSpeechAudio = null;
      }
      if (localSpeechAudioUrl) {
        URL.revokeObjectURL(localSpeechAudioUrl);
        localSpeechAudioUrl = null;
      }
    }

    function pauseLocalSttForSpeech() {
      if (localSpeechResumeTimer !== null) {
        window.clearTimeout(localSpeechResumeTimer);
        localSpeechResumeTimer = null;
      }
      localSttPausedForSpeech = true;
      localSpeechStartedAt = Date.now();
      localSpeechBargeInStartedAt = 0;
      localSttSuppressUploadsUntil = Math.max(localSttSuppressUploadsUntil, Date.now() + 900);
      if (localSttRecorder?.state === "recording") stopLocalSpeechRecorder({ discard: true });
      renderStatus(localAcousticBargeInEnabled() ? "local voice speaking; listening for interruption" : "local voice speaking; mic guarded", "speaking");
      publishShellState();
    }

    function resumeLocalSttAfterSpeech() {
      localSttSuppressUploadsUntil = Math.max(localSttSuppressUploadsUntil, Date.now() + 650);
      if (localSpeechResumeTimer !== null) window.clearTimeout(localSpeechResumeTimer);
      localSpeechResumeTimer = window.setTimeout(() => {
        localSpeechResumeTimer = null;
        if (!localSttPausedForSpeech) return;
        localSttPausedForSpeech = false;
        localSpeechStartedAt = 0;
        localSpeechBargeInStartedAt = 0;
        if (joined && localStream && usesLocalStt()) startLocalSttCapture(localStream);
      }, 700);
    }

    function interruptLocalSpeechForBargeIn(level) {
      localSpeechGeneration += 1;
      abortLocalSpeechCurrentItem();
      clearLocalSpeechQueue();
      localSttPausedForSpeech = false;
      localSpeechStartedAt = 0;
      localSpeechBargeInStartedAt = 0;
      localSttSuppressUploadsUntil = Math.max(localSttSuppressUploadsUntil, Date.now() + 220);
      stopLocalSpeechAudio();
      if (localSttRecorder?.state === "recording") stopLocalSpeechRecorder({ discard: true });
      renderStatus("local voice interrupted; listening", "ready");
      publishShellState();
      void postRealtimeTrace("agent", "Local voice speech interrupted by mic activity", { level });
    }

    async function notifyRealtimeOfPiAgentUpdate(event) {
      if (event.id === lastPiAgentNoticeId || realtimeState !== "connected" || realtimeActivationMode === "sleeping") return;
      lastPiAgentNoticeId = event.id;
      const directVoiceMessage = isVoiceAgentDirectMessage(event);
      const context = directVoiceMessage ? await readRealtimeMeetingContext().catch(() => undefined) : undefined;
      sendRealtimeTextMessage(formatPiAgentUpdateForRealtime(event, context));
      await postRealtimeTrace("agent", "Pi-agent update injected into stable Realtime agent", { eventId: event.id, type: event.type, muted: realtimeMuted });
      if (directVoiceMessage) {
        directVoiceTurnActive = true;
        directVoiceTurnToolCalled = false;
        beginRealtimeResponse("silent");
        sendRealtimeEvent({
          type: "response.create",
          response: {
            output_modalities: ["text"],
            instructions: [
              "This is a direct Pi/Codex message addressed to you, the Realtime voice agent.",
              "Treat it as one agent-to-agent dialogue turn, not as a host-facing announcement.",
              "Use the injected recent direct-dialogue JSONL as authoritative shared memory; continue from it instead of restarting.",
              "If the message expects a reply or is part of an active back-and-forth protocol, call message_pi_agent exactly once with the next concise turn.",
              "Do not answer an internal Pi/Codex turn as plain assistant text; use message_pi_agent for the reply.",
              "If the exchange is complete, if the message says stop, or if no reply is needed, respond exactly NO_ACTION.",
              "Do not speak audio for this internal turn. Do not use canvas, artifact, or markdown tools.",
              "For counting or turn-taking tests, send only the next required token/number and preserve the stop condition."
            ].join("\n")
          }
        });
        return;
      }
      if (!realtimeMuted) {
        beginRealtimeResponse("speak");
        sendRealtimeEvent({
          type: "response.create",
          response: {
            output_modalities: ["audio"],
            instructions: [
              "A pi-agent/Codex update was just injected into your conversation context.",
              "Speak one concise sentence only if the update is useful for the host right now.",
              "Make it voice-ready: short first sentence, no exact file names or paths.",
              "Mention that Codex/pi-agent produced or updated the UI/artifact if that is what happened.",
              "Do not read long content aloud. Do not create durable artifacts."
            ].join("\n")
          }
        });
        return;
      }
      beginRealtimeResponse("silent");
      sendRealtimeEvent({
        type: "response.create",
        response: {
          output_modalities: ["text"],
          instructions: [
            "A pi-agent/Codex update was just injected into your conversation context.",
            "Do not speak audio now.",
            "If the result is useful to show or explain, call raise_meeting_hand with requestedMode=show or requestedMode=review and a concise reason.",
            "Never use requestedMode=speak for Codex/pi-agent output; Codex speaks through text in the UI.",
            "If there is nothing to add, respond with exactly NO_ACTION.",
            "Do not create durable artifacts; pi-agent owns durable artifacts."
          ].join("\n")
        }
      });
    }

    function isPiAgentReviewEvent(event) {
      if (!event || event.agentId !== piAgentId) return false;
      if (event.type === "agent.hand_raise") return true;
      if (event.type !== "agent.message" || event.lifecycle !== "final") return false;
      const text = String(event.text || "").trim();
      if (!text || /^(ok|okay|noted|thanks|you.?re welcome|i.?m here|received|got it|understood)[.!]*$/i.test(text)) return false;
      if (event.surface === "status" && !event.documentId && event.stream !== "implementation") return false;
      return event.surface === "canvas" || event.stream === "implementation" || Boolean(event.documentId);
    }

    function isSpeakableCodexDraft(event) {
      if (!event || event.agentId !== piAgentId || event.type !== "agent.message") return false;
      if (event.lifecycle !== "draft" || event.streaming !== true) return false;
      if (event.surface !== "status" || isVoiceAgentDirectMessage(event)) return false;
      return Boolean(String(event.text || "").trim());
    }

    function isSpeakableCodexFinal(event) {
      if (!event || event.agentId !== piAgentId || event.type !== "agent.message") return false;
      if (event.lifecycle !== "final" || event.surface !== "status" || isVoiceAgentDirectMessage(event)) return false;
      return Boolean(codexStreamingSpeech.has(streamingSpeechKey(event)));
    }

    function handleCodexStreamingSpeech(event) {
      if (realtimeMuted) return;
      const key = streamingSpeechKey(event);
      const speech = markdownToSpeech(String(event.text || ""));
      if (!speech) return;
      const state = codexStreamingSpeech.get(key) || { consumed: 0, lastSpeech: "", queued: 0 };
      if (state.lastSpeech && !speech.startsWith(state.lastSpeech.slice(0, Math.min(state.lastSpeech.length, state.consumed)))) {
        state.consumed = Math.max(0, commonPrefixLength(state.lastSpeech, speech));
      }
      state.lastSpeech = speech;
      const available = speech.slice(state.consumed);
      const extraction = extractSpeakableSegments(available, false, { first: state.queued === 0 });
      for (const segment of extraction.segments) {
        enqueueLocalVoiceMessage(segment.text, { maxChars: Math.max(segment.maxChars || 700, segment.text.length) });
        state.queued += 1;
      }
      state.consumed += extraction.consumed;
      codexStreamingSpeech.set(key, state);
    }

    function finalizeCodexStreamingSpeech(event) {
      const key = streamingSpeechKey(event);
      const state = codexStreamingSpeech.get(key);
      if (!state) return false;
      const speech = markdownToSpeech(String(event.text || ""));
      const available = speech.slice(Math.min(state.consumed, speech.length));
      const extraction = extractSpeakableSegments(available, true, { first: state.queued === 0 });
      for (const segment of extraction.segments) {
        enqueueLocalVoiceMessage(segment.text, { maxChars: Math.max(segment.maxChars || 700, segment.text.length) });
        state.queued += 1;
      }
      if (!state.queued && speech) {
        enqueueLocalVoiceMessage(clipText(speech, 300));
      }
      codexStreamingSpeech.delete(key);
      return true;
    }

    function streamingSpeechKey(event) {
      return String(event.id || event.documentId || "pi-agent-stream");
    }

    function extractSpeakableSegments(text, final, options = {}) {
      const segments = [];
      let cursor = 0;
      const source = String(text || "");
      while (cursor < source.length) {
        const rest = source.slice(cursor);
        const leading = rest.length - rest.trimStart().length;
        const slice = rest.slice(leading);
        if (!slice.trim()) break;
        const mode = options.first && segments.length === 0 ? "first" : "continuation";
        const boundary = findSpeechBoundary(slice, final, mode);
        if (boundary < 0) break;
        const raw = slice.slice(0, boundary).trim();
        const end = leading + boundary;
        if (isUsefulSpeechSegment(raw)) segments.push({ text: raw, end, maxChars: mode === "first" ? 160 : 480 });
        cursor += end;
      }
      return { segments, consumed: cursor };
    }

    function splitLongSpeechSegment(text, maxChars = 640) {
      const chunks = [];
      let rest = String(text || "").trim();
      const limit = Math.max(240, Number(maxChars) || 640);
      while (rest.length > limit) {
        const boundary = softSpeechBoundary(rest, limit, Math.floor(limit * 0.45));
        const end = boundary > 0 ? boundary : limit;
        chunks.push(rest.slice(0, end).trim());
        rest = rest.slice(end).trim();
      }
      if (rest) chunks.push(rest);
      return chunks;
    }

    function findSpeechBoundary(text, final, mode = "continuation") {
      const normalized = String(text || "");
      const qwenLocalTts = localTtsProvider === "qwen3-tts";
      if (mode === "first") {
        const firstSentence = sentenceBoundary(normalized, final, 22, 130);
        if (firstSentence >= 0) return firstSentence;
        const early = softSpeechBoundary(normalized, final ? 120 : 95, final ? 40 : 55);
        if (early >= 0) return early;
        if (final && normalized.trim().length >= 18) {
          const fallbackBoundary = softSpeechBoundary(normalized, 130, 55);
          return fallbackBoundary >= 0 ? fallbackBoundary : normalized.length;
        }
        return -1;
      }
      if (qwenLocalTts) {
        const early = softSpeechBoundary(normalized, final ? 150 : 145, final ? 65 : 80);
        const sentence = sentenceBoundary(normalized, final, 55, 180);
        if (early >= 0 && (sentence < 0 || early < sentence)) return early;
        if (sentence >= 0) return sentence;
        if (final && normalized.trim().length >= 24) return normalized.length;
        return -1;
      }
      const sentence = sentenceBoundary(normalized, final, 160, 420);
      if (sentence >= 0) return sentence;
      const early = softSpeechBoundary(normalized, final ? 360 : 420, final ? 120 : 240);
      if (early >= 0) return early;
      if (final && normalized.trim().length >= 30) return normalized.length;
      return -1;
    }

    function sentenceBoundary(text, final, min, max) {
      const normalized = String(text || "");
      const sentence = /[.!?](?=\s|$)/g;
      let match;
      while ((match = sentence.exec(normalized))) {
        const end = match.index + 1;
        if (end >= min || final || end >= max) return end;
      }
      return -1;
    }

    function softSpeechBoundary(text, target, min) {
      const normalized = String(text || "");
      if (normalized.length < target) return -1;
      const punctuation = Math.max(
        normalized.lastIndexOf(",", target),
        normalized.lastIndexOf(";", target),
        normalized.lastIndexOf(":", target)
      );
      if (punctuation >= min) return punctuation + 1;
      const space = normalized.lastIndexOf(" ", target);
      return space >= min ? space : -1;
    }

    function isUsefulSpeechSegment(text) {
      const segment = String(text || "").trim();
      if (segment.length < 12) return false;
      if (!/[a-z0-9]/i.test(segment)) return false;
      if (/^(code block|markdown|json|yaml)$/i.test(segment)) return false;
      return true;
    }

    function commonPrefixLength(a, b) {
      const limit = Math.min(String(a).length, String(b).length);
      let index = 0;
      while (index < limit && a[index] === b[index]) index += 1;
      return index;
    }

    function isLocalSpeakablePiAgentMessage(event) {
      if (!event || event.agentId !== piAgentId) return false;
      if (event.type === "agent.hand_raise") return true;
      if (event.type !== "agent.message" || event.lifecycle !== "final") return false;
      const text = String(event.text || "").trim();
      if (!text || /^(ok|okay|noted|thanks|you.?re welcome|i.?m here)[.!]*$/i.test(text)) return false;
      return event.surface === "status" || event.surface === "canvas" || Boolean(event.documentId);
    }

    function isVoiceAgentDirectMessage(event) {
      return event?.type === "agent.message" && String(event.documentId || "").startsWith("voice-message:");
    }

    function parseVoiceAgentEnvelope(text) {
      const result = {};
      for (const line of String(text || "").split(/\r?\n/)) {
        const match = /^(Intent|Message|When):\s*(.*)$/i.exec(line.trim());
        if (!match) continue;
        result[match[1].toLowerCase()] = match[2].trim();
      }
      return result;
    }

    function localSpeechTextForPiAgentUpdate(event) {
      if (event?.type === "agent.hand_raise") return clipText(String(event.reason || "I have a suggestion."), 240);
      if (!event || event.type !== "agent.message") return "";
      if (isVoiceAgentDirectMessage(event)) {
        const envelope = parseVoiceAgentEnvelope(String(event.text || ""));
        return envelope.message || String(event.text || "").trim();
      }
      const speech = markdownToSpeech(String(event.text || ""));
      if (!speech) return "";
      if (event.surface === "canvas" || event.documentId) return clipText(`I updated the canvas. ${firstSpeechSentence(speech)}`, 300);
      return speech;
    }

    function markdownToSpeech(text) {
      return sanitizeSpokenText(String(text || "")
        .replace(/```[\s\S]*?```/g, " code block ")
        .replace(/`([^`]+)`/g, (_, value) => humanizeCodeSpan(value))
        .replace(/!\[[^\]]*\]\([^)]*\)/g, " image ")
        .replace(/\[([^\]]+)\]\([^)]*\)/g, "$1")
        .replace(/^#{1,6}\s*/gm, "")
        .replace(/^[\s>*-]+/gm, "")
        .replace(/\s+/g, " ")
        .trim());
    }

    function sanitizeSpokenText(text) {
      return String(text || "")
        .replace(/https?:\/\/[^\s)]+/gi, "the local page")
        .replace(/\b(?:[\w.-]+\/)+[\w.-]+\.(?:ts|tsx|js|jsx|mjs|json|md|html|css|py|sh|wav|mp3|safetensors)\b/gi, "the relevant file")
        .replace(/(?:^|\s)(?:\/Users|\.{1,2}\/)[^\s,;:)]+/g, " the relevant file")
        .replace(/\b[\w.-]+\.(?:ts|tsx|js|jsx|mjs|json|md|html|css|py|sh|wav|mp3|safetensors)\b/gi, "the relevant file")
        .replace(/\b(?=[A-Z0-9_]*(?:[_0-9]|=))[A-Z][A-Z0-9_]{3,}(?:=[^\s,;]+)?\b/g, "the relevant setting")
        .replace(/\s*(?:the relevant file)(?:\s*(?:,|and)\s*the relevant file)+/gi, " the relevant files")
        .replace(/\bthe relevant file\s+the relevant file\b/gi, "the relevant file")
        .replace(/\s+/g, " ")
        .trim();
    }

    function humanizeCodeSpan(value) {
      const text = String(value || "").trim();
      if (!text) return "";
      if (/^(?:[\w.-]+\/)+[\w.-]+\.[A-Za-z0-9]+$/.test(text)) return "the relevant file";
      if (/^[\w.-]+\.(?:ts|tsx|js|jsx|mjs|json|md|html|css|py|sh|wav|mp3|safetensors)$/i.test(text)) return "the relevant file";
      if (/^[A-Z][A-Z0-9_]{3,}(?:=.*)?$/.test(text)) return "the relevant setting";
      return text;
    }

    function firstSpeechSentence(text) {
      const normalized = String(text || "").trim();
      const match = /^(.{20,220}?[.!?])\s/.exec(normalized);
      return match ? match[1] : clipText(normalized, 220);
    }

    function formatPiAgentUpdateForRealtime(event, context) {
      if (isVoiceAgentDirectMessage(event)) {
        const dialogueJsonl = formatAgentDialogueJsonlForRealtime(context);
        return [
          "Direct Pi/Codex message for the Realtime voice agent.",
          "This is an agent-to-agent dialogue turn. Continue with message_pi_agent only if a reply is needed.",
          "Do not speak to the host unless explicitly asked; keep internal replies in the Pi coordination channel.",
          "",
          "kind: voice_agent_message",
          `documentId: ${event.documentId}`,
          "",
          dialogueJsonl ? "Recent direct dialogue JSONL (authoritative shared memory):" : "",
          dialogueJsonl,
          dialogueJsonl ? "" : "",
          "Current Pi/Codex message:",
          clipText(String(event.text || ""), 3000)
        ].filter((line) => line !== "").join("\n");
      }

      const lines = [
        "Direct Pi/Codex update for the Realtime voice agent.",
        "Treat this as first-class current meeting context. The UI/canvas may already show the artifact or response.",
        "If unmuted, you may briefly tell the host what changed. If muted, raise a hand for show/review only when useful.",
        ""
      ];
      if (event.type === "agent.hand_raise") {
        lines.push(`kind: hand_raise`, `requestedMode: ${event.requestedMode}`, `reason: ${event.reason}`);
      } else {
        lines.push(
          "kind: message",
          `surface: ${event.surface || "status"}`,
          `stream: ${event.stream || "conversation"}`,
          event.documentId ? `documentId: ${event.documentId}` : "",
          "",
          clipText(String(event.text || ""), 3000)
        );
      }
      return lines.filter(Boolean).join("\n");
    }

    function formatAgentDialogueJsonlForRealtime(context) {
      const root = asRecordValue(context);
      const agentDialogue = asRecordValue(root.agentDialogue);
      const recent = arrayValue(agentDialogue.recent).map(asRecordValue).slice(-16);
      const lines = recent.map((record) => JSON.stringify({
        ts: stringValue(record.ts),
        direction: stringValue(record.direction),
        role: stringValue(record.role),
        intent: stringValue(record.intent),
        taskKey: stringValue(record.taskKey),
        text: clipText(stringValue(record.text).replace(/\s+/g, " "), 500)
      }));
      return clipText(lines.join("\n"), 7000);
    }

    function summarizeMeetingContextForRealtime(context, source) {
      const root = asRecordValue(context);
      const currentCanvas = asRecordValue(root.currentCanvas);
      const tasks = arrayValue(root.tasks).map(asRecordValue).slice(0, 8);
      const implementationQueue = asRecordValue(root.implementationQueue);
      const piAgent = asRecordValue(root.piAgent);
      const piMessages = arrayValue(piAgent.messages).map(asRecordValue).slice(-4);
      const piHands = arrayValue(piAgent.raisedHands).map(asRecordValue).slice(-4);
      const transcript = arrayValue(root.transcript).map(asRecordValue).slice(-8);
      const lines = [
        `Direct resume context for the Realtime voice agent (${source}).`,
        "Continue from this state; do not treat reconnect as a new meeting.",
        "The current canvas and Pi/Codex outputs are first-class context.",
        ""
      ];
      const canvasText = stringValue(currentCanvas.text);
      if (canvasText) {
        lines.push(
          "Current canvas:",
          `documentId: ${stringValue(currentCanvas.documentId) || "current"}`,
          clipText(canvasText.replace(/\s+/g, " "), 900),
          ""
        );
      }
      if (tasks.length) {
        lines.push("Current tasks:");
        for (const task of tasks) {
          lines.push(`- ${stringValue(task.status) || "unknown"}: ${stringValue(task.title) || "untitled"}${stringValue(task.taskClass) ? ` [${stringValue(task.taskClass)}]` : ""}`);
        }
        lines.push("");
      }
      lines.push(
        `Implementation queue: queued=${arrayValue(implementationQueue.queued).length}, working=${arrayValue(implementationQueue.working).length}, done=${arrayValue(implementationQueue.done).length}`,
        ""
      );
      if (piMessages.length || piHands.length) {
        lines.push("Recent Pi/Codex outputs:");
        for (const message of piMessages) lines.push(`- ${clipText(stringValue(message.text).replace(/\s+/g, " "), 360)}`);
        for (const hand of piHands) lines.push(`- hand ${stringValue(hand.requestedMode) || "review"}: ${clipText(stringValue(hand.reason).replace(/\s+/g, " "), 260)}`);
        lines.push("");
      }
      if (transcript.length) {
        lines.push("Recent transcript:");
        for (const turn of transcript) lines.push(`- ${stringValue(turn.speakerLabel) || "speaker"}: ${clipText(stringValue(turn.text).replace(/\s+/g, " "), 220)}`);
      }
      return clipText(lines.filter(Boolean).join("\n"), 6000);
    }

    async function postRealtimeTrace(channel, text, details, stream = "conversation") {
      await postMeetingEvent({
        id: newEventId("trace"),
        type: "agent.trace",
        stream,
        meetingId,
        createdAt: nowIso(),
        agentId: realtimeAgentId,
        channel,
        text,
        details
      });
    }

    async function postMeetingEvent(event) {
      if (peerOnly || !api) return;
      try {
        await fetch(`${api}/events`, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify(event)
        });
      } catch (error) {
        console.warn("meeting event failed", error);
      }
    }

    function setRealtimeState(next) {
      realtimeState = next;
      renderStatus();
      publishShellState();
    }

    function renderStatus(text, forcedState) {
      if (text) {
        statusEl.textContent = text;
      } else if (!joined) {
        statusEl.textContent = "stable shell idle";
      } else if (!usesRealtimeVoice()) {
        if (localPushToTalkActive) statusEl.textContent = `${speechProviderLabel()} recording; release Space to send`;
        else statusEl.textContent = localCaptureMode() === "push-to-talk"
          ? `${speechProviderLabel()} ready (hold Space to speak)`
          : `${speechProviderLabel()} listening (${localSttActive ? "local STT active" : "local STT idle"})`;
      } else if (realtimeState === "connected") {
        statusEl.textContent = `voice agent live (${voiceMode === "hybrid" ? `${speechProviderLabel()} + ` : ""}${realtimeMuted ? "muted listener" : "audio responder"}, ${realtimeActivationLabel()})`;
      } else if (realtimeState === "connecting") {
        statusEl.textContent = "voice agent connecting";
      } else {
        statusEl.textContent = realtimeDesired ? "voice agent retrying" : "voice agent idle";
      }
      const state = forcedState || (!joined ? "idle" : realtimeState === "connected" && !realtimeMuted && realtimeActivationMode === "active" ? "speaking" : "ready");
      dotEl.className = `dot ${state === "ready" ? "ready" : state === "speaking" ? "speaking" : ""}`;
      muteButton.textContent = realtimeMuted ? "Unmute agent" : "Mute agent";
      muteButton.disabled = !joined;
      sleepButton.textContent = realtimeActivationMode === "sleeping" ? "Wake agent" : "Sleep until prompted";
      sleepButton.disabled = !joined || !usesRealtimeVoice();
      speakButton.hidden = !joined || !usesLocalStt() || localCaptureMode() !== "push-to-talk";
      speakButton.disabled = !joined || !usesLocalStt() || localCaptureMode() !== "push-to-talk";
      speakButton.textContent = localPushToTalkActive ? "Release to send" : "Hold Space to speak";
      speakButton.classList.toggle("active", localPushToTalkActive);
      voiceModeSelect.value = voiceMode;
      captureModeSelect.hidden = !usesLocalStt();
      captureModeSelect.disabled = !usesLocalStt();
      captureModeSelect.value = localCaptureMode();
    }

    function publishShellState() {
      uiFrame.contentWindow?.postMessage({
        type: "meeting:shell-state",
        joined,
        realtimeState,
        realtimeMuted,
        realtimeResponseMode,
        realtimeActivationMode,
        voiceMode,
        captureMode: localCaptureMode(),
        localSttActive,
        speechProvider,
        localTtsProvider,
        localStreamingTts,
        reconnectAttempt: realtimeReconnectAttempt
      }, window.location.origin);
    }

    function speechProviderLabel() {
      if (speechProvider === "voxtral-http") return "Local Voxtral";
      if (speechProvider === "local-whisper") return "Local Whisper";
      if (speechProvider === "moshi-http") return "Local Moshi";
      if (speechProvider === "parakeet-http") return "Local Parakeet";
      return "Local STT";
    }

    function implementationToolName(name) {
      return name === "run_codex_task" || name === "publish_task_result" || name === "deliver_assistant_output" || name === "message_pi_agent";
    }

    function isRealtimeTextDelta(type) {
      return type === "response.output_text.delta" || type === "response.text.delta";
    }

    function isRealtimeTextDone(type) {
      return type === "response.output_text.done" || type === "response.text.done";
    }

    function isRealtimeAudioTranscriptDelta(type) {
      return type === "response.output_audio_transcript.delta" || type === "response.audio_transcript.delta";
    }

    function isRealtimeAudioTranscriptDone(type) {
      return type === "response.output_audio_transcript.done" || type === "response.audio_transcript.done";
    }

    function newEventId(prefix) {
      return `${prefix}_${Date.now().toString(36)}_${Math.random().toString(36).slice(2, 8)}`;
    }

    function nowIso() {
      return new Date().toISOString();
    }

    function asRecordValue(value) {
      return value && typeof value === "object" && !Array.isArray(value) ? value : {};
    }

    function arrayValue(value) {
      return Array.isArray(value) ? value : [];
    }

    function stringValue(value) {
      return typeof value === "string" ? value.trim() : "";
    }

    function clipText(text, maxLength) {
      const normalized = String(text || "").trim();
      return normalized.length > maxLength ? `${normalized.slice(0, maxLength)}...` : normalized;
    }

    function preferredMimeType() {
      for (const type of ["audio/webm;codecs=opus", "audio/mp4", "audio/webm"]) {
        if (MediaRecorder.isTypeSupported(type)) return type;
      }
      return "";
    }

    function shouldRelayDirectVoiceText(text) {
      const normalized = String(text || "").trim();
      if (!normalized || normalized === "NO_ACTION") return false;
      if (/^(ok|okay|noted|thanks|done|complete|completed|stop|stopped)[.!]*$/i.test(normalized)) return false;
      return true;
    }
  </script>

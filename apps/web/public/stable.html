<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Meeting Stable Shell</title>
  <style>
    :root { color-scheme: dark; font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
    * { box-sizing: border-box; }
    html, body { width: 100%; height: 100%; overflow: hidden; background: #050816; }
    body { margin: 0; color: #f8fafc; }
    .bar { width: 100%; height: 52px; display: flex; align-items: center; gap: 12px; padding: 0 14px; border-bottom: 1px solid rgba(148, 163, 184, 0.22); background: rgba(15, 23, 42, 0.98); overflow: hidden; }
    .brand { font-weight: 800; letter-spacing: -0.02em; }
    .status { display: inline-flex; align-items: center; gap: 8px; color: #cbd5e1; font-size: 13px; }
    .dot { width: 9px; height: 9px; border-radius: 999px; background: #64748b; box-shadow: 0 0 18px rgba(100, 116, 139, 0.35); }
    .dot.ready { background: #f59e0b; box-shadow: 0 0 20px rgba(245, 158, 11, 0.45); }
    .dot.speaking { background: #22c55e; box-shadow: 0 0 20px rgba(34, 197, 94, 0.7); }
    button { border: 0; border-radius: 999px; padding: 8px 12px; background: #7c3aed; color: white; font-weight: 700; cursor: pointer; user-select: none; }
    button.secondary { background: rgba(148, 163, 184, 0.18); color: #e2e8f0; }
    button.speak { background: #16a34a; min-width: 160px; }
    button.speak[disabled] { opacity: 0.5; cursor: not-allowed; }
    button.speak.active { background: #dc2626; }
    select { border: 1px solid rgba(148, 163, 184, 0.35); border-radius: 999px; padding: 8px 10px; background: rgba(15, 23, 42, 0.95); color: #e2e8f0; font-weight: 700; }
    audio { display: none; }
    kbd { border: 1px solid rgba(148, 163, 184, 0.45); border-bottom-width: 2px; border-radius: 6px; padding: 1px 6px; background: rgba(15, 23, 42, 0.9); color: #e2e8f0; font-size: 12px; }
    iframe { display: block; width: 100%; height: calc(100% - 52px); border: 0; background: #050816; }
    .spacer { flex: 1 1 auto; min-width: 0; }
    .hint { color: #94a3b8; font-size: 12px; white-space: nowrap; }
  </style>
</head>
<body>
  <div class="bar">
    <div class="brand">Meeting</div>
    <div class="status"><span id="dot" class="dot"></span><span id="status">stable shell idle</span></div>
    <div class="spacer"></div>
    <div class="hint">Voice runs in this stable shell. UI below can reload safely.</div>
    <select id="voiceMode" aria-label="Voice mode">
      <option value="realtime">OpenAI voice</option>
      <option value="local">Local Whisper</option>
      <option value="hybrid">Hybrid</option>
    </select>
    <button id="join">Join meeting</button>
    <button id="mute" class="secondary" disabled>Mute agent</button>
    <button id="sleep" class="secondary" disabled>Sleep until prompted</button>
    <button id="speak" class="speak" disabled hidden>Hold Space to speak</button>
    <button id="leave" class="secondary" hidden>Leave</button>
  </div>
  <audio id="remoteAudio" autoplay></audio>
  <iframe id="ui" src="/?embedded=1"></iframe>

  <script type="module">
    const api = localStorage.getItem("meeting.api") || "http://localhost:4317";
    const meetingId = localStorage.getItem("meeting.id") || "local-demo";
    const autoJoinKey = "meeting.stable.autoJoin";
    const legacyAutoJoinKey = "meeting.autoJoin";
    const realtimeAgentId = "realtime-codex";
    const piAgentId = "pi-agent";
    const localAudioConstraints = { echoCancellation: true, noiseSuppression: true, autoGainControl: true };
    const requestedVoiceMode = parseVoiceMode(new URLSearchParams(window.location.search).get("voiceMode"));
    const hasExplicitVoiceMode = Boolean(requestedVoiceMode);

    const statusEl = document.getElementById("status");
    const dotEl = document.getElementById("dot");
    const joinButton = document.getElementById("join");
    const leaveButton = document.getElementById("leave");
    const muteButton = document.getElementById("mute");
    const sleepButton = document.getElementById("sleep");
    const speakButton = document.getElementById("speak");
    const voiceModeSelect = document.getElementById("voiceMode");
    const remoteAudio = document.getElementById("remoteAudio");
    const uiFrame = document.getElementById("ui");

    let localStream = null;
    let joined = false;
    let voiceMode = requestedVoiceMode || parseVoiceMode(localStorage.getItem("meeting.voiceMode")) || "realtime";
    let voiceModeManuallySelected = false;
    let speechProvider = "unknown";
    let realtimePeer = null;
    let realtimeChannel = null;
    let realtimeState = "idle";
    let realtimeDesired = usesRealtimeVoice();
    let realtimeMuted = false;
    let realtimeResponseMode = "speak";
    let realtimeActivationMode = "active";
    let lastRealtimeWakeAt = 0;
    let realtimeReconnectTimer = null;
    let realtimeReconnectAttempt = 0;
    let localTtsProvider = "unknown";
    let localStreamingTts = false;
    let assistantDraft = "";
    let assistantDraftMessageId = null;
    let assistantDraftFlushTimer = null;
    let localSttActive = false;
    let localSttStream = null;
    let localSttRecorder = null;
    let localSttChunkTimer = null;
    let localSttAudioContext = null;
    let localSttAudioSource = null;
    let localSttAnalyser = null;
    let localSttAnalysisData = null;
    let localSttVadTimer = null;
    let localSttRecorderStartedAt = 0;
    let localSttLastVoiceAt = 0;
    let localSttDiscardCurrentChunk = false;
    let localSttSuppressUploadsUntil = 0;
    let localSttPausedForSpeech = false;
    let localPushToTalkActive = false;
    let localSpeechAudio = null;
    let localSpeechAudioUrl = null;
    let localSpeechStreamPlayback = null;
    let localSpeechFinishCurrent = null;
    let localSpeechQueue = [];
    let localSpeechQueueDraining = false;
    const codexStreamingSpeech = new Map();
    let localSpeechStartedAt = 0;
    let localSpeechBargeInStartedAt = 0;
    let localSpeechResumeTimer = null;
    let localSpeechGeneration = 0;
    let directVoiceTurnActive = false;
    let directVoiceTurnToolCalled = false;
    let analysisTimer = null;
    let liveAnalysisTimer = null;
    let lastAnalysisAt = 0;
    let lastPiAgentNoticeId = null;
    let eventsSource = null;
    const transcriptDraftIds = new Map();
    const transcriptDraftText = new Map();

    joinButton.addEventListener("click", () => join().catch((error) => {
      console.warn(error);
      void postRealtimeTrace("error", "Stable shell join failed", { error: error?.message || String(error) });
      renderStatus(`join failed: ${error?.message || error}`, "idle");
    }));
    leaveButton.addEventListener("click", leave);
    muteButton.addEventListener("click", () => setRealtimeAgentMuted(!realtimeMuted));
    sleepButton.addEventListener("click", () => setRealtimeAgentActivationMode(realtimeActivationMode === "sleeping" ? "active" : "sleeping", "stable shell toggle"));
    voiceModeSelect.addEventListener("change", () => {
      voiceModeManuallySelected = true;
      setVoiceMode(String(voiceModeSelect.value || "realtime"));
    });
    speakButton.addEventListener("pointerdown", (event) => {
      event.preventDefault();
      startLocalPushToTalk();
    });
    speakButton.addEventListener("pointerup", (event) => {
      event.preventDefault();
      stopLocalPushToTalk();
    });
    speakButton.addEventListener("pointercancel", () => stopLocalPushToTalk());
    speakButton.addEventListener("pointerleave", () => stopLocalPushToTalk());
    window.addEventListener("keydown", handleLocalPushToTalkKeyDown);
    window.addEventListener("keyup", handleLocalPushToTalkKeyUp);
    window.addEventListener("blur", () => stopLocalPushToTalk({ discard: true }));
    uiFrame.addEventListener("load", publishShellState);

    window.addEventListener("message", (event) => {
      if (event.origin !== window.location.origin) return;
      const data = event.data || {};
      if (data.type === "meeting:shell-state:request") publishShellState();
      if (data.type === "meeting:realtime:restart") restartRealtimeAgent();
      if (data.type === "meeting:realtime:mute") setRealtimeAgentMuted(Boolean(data.muted));
      if (data.type === "meeting:realtime:activation") setRealtimeAgentActivationMode(data.mode === "sleeping" ? "sleeping" : "active", String(data.reason || "embedded UI"));
      if (data.type === "meeting:realtime:prompt") sendRealtimePrompt(String(data.text || ""));
      if (data.type === "meeting:realtime:floor") requestAgentFloor(String(data.reason || ""));
      if (data.type === "meeting:realtime:text-floor") requestAgentTextFloor(String(data.mode || "show"), String(data.reason || ""));
      if (data.type === "meeting:push-to-talk:start") startLocalPushToTalk();
      if (data.type === "meeting:push-to-talk:stop") stopLocalPushToTalk();
    });

    voiceModeSelect.value = voiceMode;
    void loadSpeechStatus().then(() => {
      renderStatus();
      publishShellState();
    }).catch((error) => {
      void postRealtimeTrace("error", "Speech provider status failed", { error: error?.message || String(error) });
    });
    connectEventStream();
    if (sessionStorage.getItem(autoJoinKey) === "true" || sessionStorage.getItem(legacyAutoJoinKey) === "true") {
      void join().catch((error) => {
        console.warn("stable shell auto-join failed", error);
        sessionStorage.removeItem(autoJoinKey);
        renderStatus("click Join meeting to restore mic permission", "idle");
      });
    } else {
      renderStatus("stable shell idle", "idle");
    }

    async function join() {
      if (joined) {
        if (usesRealtimeVoice()) ensureRealtimeConnected("join requested while already joined");
        return;
      }
      await loadSpeechStatus().catch(() => undefined);
      localStream = await getMeetingMediaStream();
      joined = true;
      realtimeDesired = usesRealtimeVoice();
      sessionStorage.setItem(autoJoinKey, "true");
      sessionStorage.setItem(legacyAutoJoinKey, "true");
      joinButton.hidden = true;
      leaveButton.hidden = false;
      muteButton.disabled = false;
      speakButton.disabled = true;
      renderStatus(usesRealtimeVoice() ? "voice agent connecting" : "local voice listening", "ready");
      publishShellState();
      if (usesLocalStt()) startLocalSttCapture(localStream);
      if (usesRealtimeVoice()) {
        void postRealtimeTrace("agent", "Stable shell joined meeting; starting Realtime voice", { voiceMode, speechProvider });
        connectRealtimeAgent(localStream);
      } else {
        void postRealtimeTrace("agent", "Stable shell joined meeting with local voice mode", { voiceMode, speechProvider });
        renderStatus();
        publishShellState();
      }
    }

    async function getMeetingMediaStream() {
      try {
        return await navigator.mediaDevices.getUserMedia({ audio: localAudioConstraints, video: true });
      } catch (error) {
        await postRealtimeTrace("debug", "Video capture failed; falling back to audio-only meeting stream", { error: error?.message || String(error) });
        return await navigator.mediaDevices.getUserMedia({ audio: localAudioConstraints, video: false });
      }
    }

    function leave() {
      joined = false;
      realtimeDesired = false;
      sessionStorage.removeItem(autoJoinKey);
      sessionStorage.removeItem(legacyAutoJoinKey);
      clearRealtimeReconnect();
      disconnectRealtimeAgent({ intentional: true });
      stopLocalSttCapture({ suppressUploads: true });
      localSttPausedForSpeech = false;
      localSpeechGeneration += 1;
      clearLocalSpeechQueue();
      if (localSpeechResumeTimer !== null) {
        window.clearTimeout(localSpeechResumeTimer);
        localSpeechResumeTimer = null;
      }
      stopLocalSpeechAudio();
      localStream?.getTracks().forEach((track) => track.stop());
      localStream = null;
      joinButton.hidden = false;
      leaveButton.hidden = true;
      muteButton.disabled = true;
      renderStatus("stable shell idle", "idle");
      publishShellState();
      void postRealtimeTrace("agent", "Stable shell left meeting", undefined);
    }

    function connectRealtimeAgent(stream) {
      if (!joined || !stream || realtimeState !== "idle") return;
      clearRealtimeReconnect();
      realtimeDesired = true;
      setRealtimeState("connecting");
      beginRealtimeResponse(baseRealtimeMode());
      assistantDraft = "";

      void (async () => {
        try {
          const peer = new RTCPeerConnection();
          realtimePeer = peer;
          peer.ontrack = (event) => {
            remoteAudio.srcObject = event.streams[0];
            remoteAudio.muted = realtimeMuted;
            void remoteAudio.play().catch((error) => {
              void postRealtimeTrace("debug", "Remote audio playback is waiting for browser permission", { error: error?.message || String(error) });
            });
          };
          peer.addEventListener("connectionstatechange", () => {
            if (realtimePeer !== peer) return;
            if (peer.connectionState === "failed" || peer.connectionState === "disconnected" || peer.connectionState === "closed") {
              handleRealtimeUnexpectedClose(`peer ${peer.connectionState}`);
            }
          });

          const audioTrack = stream.getAudioTracks()[0];
          if (!audioTrack || audioTrack.readyState !== "live") throw new Error("No live microphone track is available");
          peer.addTrack(audioTrack, stream);

          const channel = peer.createDataChannel("oai-events");
          realtimeChannel = channel;
          channel.addEventListener("open", () => {
            setRealtimeState("connected");
            realtimeReconnectAttempt = 0;
            configureRealtimeSession();
            void requestBootstrapContextSync();
            void postMeetingEvent({
              id: newEventId("msg"),
              type: "agent.message",
              stream: "conversation",
              meetingId,
              createdAt: nowIso(),
              agentId: realtimeAgentId,
              format: "markdown",
              surface: "status",
              lifecycle: "final",
              text: [
                "Status: Realtime agent connected through the stable shell.",
                `Confidence: High — mode is ${realtimeActivationLabel()} / ${realtimeMuted ? "muted listener" : "audio responder"}.`,
                "Next: Use the prompt box or wake control; sleeping mode will not speak until explicitly prompted."
              ].join("\n")
            });
          });
          channel.addEventListener("message", (event) => {
            void handleRealtimeEvent(String(event.data));
          });
          channel.addEventListener("close", () => {
            if (realtimeChannel === channel) handleRealtimeUnexpectedClose("data channel closed");
          });
          channel.addEventListener("error", () => {
            if (realtimeChannel === channel) handleRealtimeUnexpectedClose("data channel error");
          });

          const offer = await peer.createOffer();
          await peer.setLocalDescription(offer);

          const response = await fetch(`${api}/realtime/call`, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ sdp: offer.sdp })
          });
          const answerSdp = await response.text();
          if (!response.ok) throw new Error(answerSdp || `Realtime call failed with ${response.status}`);
          await peer.setRemoteDescription({ type: "answer", sdp: answerSdp });
        } catch (error) {
          disconnectRealtimeAgent({ intentional: true });
          setRealtimeState("idle");
          await postRealtimeTrace("error", error instanceof Error ? error.message : String(error), undefined);
          scheduleRealtimeReconnect(undefined, "connect failed");
        }
      })();
    }

    function disconnectRealtimeAgent(options = {}) {
      if (analysisTimer !== null) {
        window.clearTimeout(analysisTimer);
        analysisTimer = null;
      }
      if (liveAnalysisTimer !== null) {
        window.clearTimeout(liveAnalysisTimer);
        liveAnalysisTimer = null;
      }
      if (assistantDraftFlushTimer !== null) {
        window.clearTimeout(assistantDraftFlushTimer);
        assistantDraftFlushTimer = null;
      }
      const channel = realtimeChannel;
      const peer = realtimePeer;
      realtimeChannel = null;
      realtimePeer = null;
      channel?.close();
      peer?.close();
      remoteAudio.srcObject = null;
      assistantDraft = "";
      assistantDraftMessageId = null;
      transcriptDraftIds.clear();
      transcriptDraftText.clear();
      restoreRealtimeBaseMode();
      setRealtimeState("idle");
      if (!options.intentional) scheduleRealtimeReconnect(undefined, "unexpected disconnect");
    }

    function handleRealtimeUnexpectedClose(reason) {
      if (!realtimeDesired || !joined) return;
      void postRealtimeTrace("debug", "Realtime connection closed; reconnecting from stable shell", { reason });
      disconnectRealtimeAgent({ intentional: true });
      scheduleRealtimeReconnect(undefined, reason);
    }

    function scheduleRealtimeReconnect(delayMs, reason = "scheduled reconnect") {
      if (!usesRealtimeVoice() || !realtimeDesired || !joined || realtimeReconnectTimer !== null) return;
      const attempt = realtimeReconnectAttempt;
      const delay = delayMs ?? Math.min(15000, 750 * 2 ** Math.min(attempt, 5));
      realtimeReconnectTimer = window.setTimeout(() => {
        realtimeReconnectTimer = null;
        if (!usesRealtimeVoice() || !realtimeDesired || !joined || realtimeState !== "idle") return;
        realtimeReconnectAttempt += 1;
        void postRealtimeTrace("agent", "Realtime auto-reconnect from stable shell", { attempt: realtimeReconnectAttempt, reason });
        connectRealtimeAgent(localStream);
      }, delay);
      renderStatus(`voice reconnecting in ${Math.round(delay / 1000)}s`, "ready");
      publishShellState();
    }

    function clearRealtimeReconnect() {
      if (realtimeReconnectTimer !== null) {
        window.clearTimeout(realtimeReconnectTimer);
        realtimeReconnectTimer = null;
      }
    }

    function restartRealtimeAgent() {
      if (!joined) {
        void join();
        return;
      }
      if (!usesRealtimeVoice()) {
        renderStatus("local voice mode active", "ready");
        return;
      }
      realtimeDesired = true;
      realtimeReconnectAttempt = 0;
      clearRealtimeReconnect();
      disconnectRealtimeAgent({ intentional: true });
      scheduleRealtimeReconnect(100, "manual restart");
    }

    function ensureRealtimeConnected(reason) {
      if (!usesRealtimeVoice() || !joined || realtimeState !== "idle") return;
      scheduleRealtimeReconnect(0, reason);
    }

    function configureRealtimeSession() {
      sendRealtimeEvent({
        type: "session.update",
        session: {
          type: "realtime",
          audio: {
            input: {
              transcription: {
                model: "gpt-4o-mini-transcribe",
                language: "en"
              },
              turn_detection: {
                type: "server_vad",
                create_response: shouldCreateRealtimeResponse(),
                interrupt_response: shouldCreateRealtimeResponse(),
                prefix_padding_ms: 300,
                silence_duration_ms: realtimeActivationMode === "sleeping" ? 1200 : 900
              }
            }
          }
        }
      });
    }

    async function requestBootstrapContextSync() {
      const context = await readRealtimeMeetingContext().catch(() => undefined);
      if (context) {
        sendRealtimeTextMessage(summarizeMeetingContextForRealtime(context, "reconnect"));
        await postRealtimeTrace("agent", "Resume context injected into stable Realtime agent", { source: "read_meeting_context" });
      }
      beginRealtimeResponse("silent");
      sendRealtimeEvent({
        type: "response.create",
        response: {
          output_modalities: ["text"],
          instructions: [
            "Bootstrap silently.",
            context
              ? "Internalize the resume context message that was just injected into the conversation."
              : "Call read_meeting_context immediately and internalize the current canvas, transcript, tasks, and implementation queue.",
            "Do not explore the repo to learn the current project status.",
            "Do not speak audio.",
            "If there is nothing urgent after syncing, respond with exactly NO_ACTION."
          ].join("\n")
        }
      });
    }

    async function handleRealtimeEvent(raw) {
      let event;
      try {
        event = JSON.parse(raw);
      } catch {
        await postRealtimeTrace("error", "Invalid Realtime event payload", { raw });
        return;
      }

      const type = String(event.type || "");
      if (type === "session.created" || type === "session.updated") {
        await postRealtimeTrace("debug", type, event);
        return;
      }
      if (type === "response.created") {
        const mode = responseModeFromEvent(event);
        if (mode) beginRealtimeResponse(mode);
        return;
      }
      if (type === "conversation.item.input_audio_transcription.delta") {
        await persistRealtimeTranscriptDelta(event);
        return;
      }
      if (type === "conversation.item.input_audio_transcription.completed") {
        await persistRealtimeTranscriptCompleted(event);
        if (realtimeActivationMode === "sleeping") {
          handleSleepingRealtimeTurn(String(event.transcript || event.text || ""));
          return;
        }
        if (realtimeMuted) {
          scheduleSilentAnalysis("user_turn_completed");
        } else {
          beginRealtimeResponse("speak");
        }
        return;
      }
      if ((isRealtimeTextDelta(type) && realtimeResponseMode === "silent")
        || (isRealtimeAudioTranscriptDelta(type) && realtimeResponseMode === "speak")) {
        assistantDraft += String(event.delta || "");
        scheduleAssistantDraftPersist();
        publishShellState();
        return;
      }
      if ((isRealtimeTextDone(type) && realtimeResponseMode === "silent")
        || (isRealtimeAudioTranscriptDone(type) && realtimeResponseMode === "speak")) {
        const completedText = String(event.transcript || event.text || "").trim();
        if (!assistantDraft.trim() && completedText) assistantDraft = completedText;
        if (assistantDraft.trim() && assistantDraft.trim() !== "NO_ACTION") {
          if (directVoiceTurnActive) {
            if (!directVoiceTurnToolCalled && shouldRelayDirectVoiceText(assistantDraft)) {
              await relayDirectVoiceTextToPiAgent(assistantDraft.trim());
            } else {
              await postRealtimeTrace("debug", "Suppressed direct voice-agent internal text", { text: assistantDraft.trim(), toolCalled: directVoiceTurnToolCalled });
            }
          } else {
            await postMeetingEvent({
              id: assistantDraftMessageId || newEventId("msg"),
              type: "agent.message",
              stream: "conversation",
              meetingId,
              createdAt: nowIso(),
              agentId: realtimeAgentId,
              format: "markdown",
              surface: "status",
              lifecycle: "final",
              text: assistantDraft.trim()
            });
          }
        }
        directVoiceTurnActive = false;
        directVoiceTurnToolCalled = false;
        assistantDraftMessageId = null;
        if (assistantDraftFlushTimer !== null) {
          window.clearTimeout(assistantDraftFlushTimer);
          assistantDraftFlushTimer = null;
        }
        assistantDraft = "";
        publishShellState();
        return;
      }
      if (type === "response.function_call_arguments.done") {
        const name = String(event.name || "");
        const argsText = String(event.arguments || "{}");
        const callId = String(event.call_id || "");
        const isDirectVoicePiReply = directVoiceTurnActive && name === "message_pi_agent";
        if (isDirectVoicePiReply) directVoiceTurnToolCalled = true;
        await postRealtimeTrace("tool", `Tool requested: ${name}`, argsText, implementationToolName(name) ? "implementation" : "conversation");
        let parsedArgs = {};
        try {
          parsedArgs = JSON.parse(argsText);
        } catch {
          parsedArgs = { raw: argsText };
        }
        const toolResponse = await fetch(`${api}/realtime/tool`, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ name, arguments: parsedArgs })
        }).then((res) => res.json());
        await postRealtimeTrace(toolResponse.ok ? "tool" : "error", `Tool result: ${name}`, toolResponse, implementationToolName(name) ? "implementation" : "conversation");
        sendRealtimeEvent({
          type: "conversation.item.create",
          item: {
            type: "function_call_output",
            call_id: callId,
            output: JSON.stringify(toolResponse)
          }
        });
        if (isDirectVoicePiReply) {
          directVoiceTurnActive = false;
          directVoiceTurnToolCalled = false;
          return;
        }
        sendFollowupResponse();
        return;
      }
      if (type === "error") {
        await postRealtimeTrace("error", "Realtime error", event);
        return;
      }
      if (type === "response.done") {
        restoreRealtimeBaseMode();
      }
    }

    function sendRealtimeEvent(event) {
      if (!realtimeChannel || realtimeChannel.readyState !== "open") return;
      realtimeChannel.send(JSON.stringify(event));
    }

    function sendRealtimeTextMessage(text) {
      sendRealtimeEvent({
        type: "conversation.item.create",
        item: {
          type: "message",
          role: "user",
          content: [{ type: "input_text", text }]
        }
      });
    }

    async function readRealtimeMeetingContext() {
      const response = await fetch(`${api}/realtime/tool`, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ name: "read_meeting_context", arguments: {} })
      }).then((res) => res.json());
      if (!response.ok) throw new Error(response.error || "read_meeting_context failed");
      return response.output;
    }

    async function loadSpeechStatus() {
      const health = await fetch(`${api}/health`).then((res) => res.json());
      speechProvider = String(health?.speech?.provider || "unknown");
      localTtsProvider = String(health?.speech?.localTts?.provider || "unknown");
      localStreamingTts = Boolean(health?.speech?.streamingTts);
      preferLocalVoiceForLocalProvider();
      return health;
    }

    async function relayDirectVoiceTextToPiAgent(text) {
      const message = clipText(String(text || ""), 1000);
      await postRealtimeTrace("tool", "Relaying direct voice-agent text to pi-agent", { message }, "implementation");
      const toolResponse = await fetch(`${api}/realtime/tool`, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ name: "message_pi_agent", arguments: { intent: "request", message } })
      }).then((res) => res.json());
      await postRealtimeTrace(toolResponse.ok ? "tool" : "error", "Relayed direct voice-agent text result", toolResponse, "implementation");
    }

    function setVoiceMode(next, options = {}) {
      const mode = parseVoiceMode(next) || "realtime";
      const previous = voiceMode;
      voiceMode = mode;
      voiceModeSelect.value = mode;
      if (options.persist !== false) localStorage.setItem("meeting.voiceMode", mode);
      if (joined && localStream) {
        if (usesLocalStt()) startLocalSttCapture(localStream);
        else stopLocalSttCapture();
        if (usesRealtimeVoice()) {
          realtimeDesired = true;
          ensureRealtimeConnected("voice mode changed");
        } else {
          realtimeDesired = false;
          clearRealtimeReconnect();
          disconnectRealtimeAgent({ intentional: true });
        }
      }
      if (options.trace !== false && previous !== mode) void postRealtimeTrace("agent", "Stable shell voice mode changed", { previous, voiceMode: mode, speechProvider });
      renderStatus();
      publishShellState();
    }

    function usesRealtimeVoice() {
      return voiceMode === "realtime" || voiceMode === "hybrid";
    }

    function usesLocalStt() {
      return voiceMode === "local" || voiceMode === "hybrid";
    }

    function usesLocalSpeechOutput() {
      return voiceMode === "local";
    }

    function preferLocalVoiceForLocalProvider() {
      if (hasExplicitVoiceMode || voiceModeManuallySelected) return;
      if ((speechProvider === "local-whisper" || speechProvider === "voxtral-http" || speechProvider === "moshi-http") && voiceMode === "realtime") {
        setVoiceMode("local", { persist: true, trace: false });
      }
    }

    function parseVoiceMode(value) {
      return value === "local" || value === "hybrid" || value === "realtime" ? value : null;
    }

    function setRealtimeAgentMuted(muted) {
      realtimeMuted = muted;
      remoteAudio.muted = muted;
      restoreRealtimeBaseMode();
      if (realtimeState === "connected") {
        configureRealtimeSession();
        void postRealtimeTrace("agent", muted ? "Realtime agent muted in stable shell" : "Realtime agent unmuted in stable shell", { audioResponses: shouldCreateRealtimeResponse() });
      }
      renderStatus();
      publishShellState();
    }

    function setRealtimeAgentActivationMode(mode, reason = "manual") {
      realtimeActivationMode = mode === "sleeping" ? "sleeping" : "active";
      if (realtimeActivationMode === "sleeping") {
        clearAnalysisTimers();
        beginRealtimeResponse("silent");
      }
      if (realtimeState === "connected") configureRealtimeSession();
      void postRealtimeTrace("agent", realtimeActivationMode === "sleeping" ? "Realtime agent sleeping until prompted in stable shell" : "Realtime agent active in stable shell", { reason, muted: realtimeMuted });
      renderStatus();
      publishShellState();
    }

    function handleSleepingRealtimeTurn(transcriptText) {
      const decision = decideRealtimeWake(transcriptText);
      if (!decision.shouldWake) {
        void postRealtimeTrace("debug", "Sleeping stable Realtime ignored VAD turn", { reason: decision.reason });
        return;
      }
      lastRealtimeWakeAt = Date.now();
      realtimeActivationMode = "active";
      configureRealtimeSession();
      beginRealtimeResponse("silent");
      void postRealtimeTrace("agent", "Stable Realtime agent woke from prompt-like speech", { reason: decision.reason, muted: realtimeMuted });
      renderStatus();
      publishShellState();
    }

    function sendRealtimePrompt(text) {
      const clean = text.trim();
      if (!clean) return;
      if (realtimeState !== "connected") {
        void postRealtimeTrace("error", "Prompt could not be sent because stable Realtime is not connected", { text: clean });
        ensureRealtimeConnected("prompt while disconnected");
        return;
      }
      if (realtimeActivationMode === "sleeping") {
        realtimeActivationMode = "active";
        configureRealtimeSession();
        void postRealtimeTrace("agent", "Stable Realtime agent woke from explicit text prompt", undefined);
        renderStatus();
        publishShellState();
      }
      sendRealtimeTextMessage(clean);
      beginRealtimeResponse("silent");
      sendRealtimeEvent({
        type: "response.create",
        response: { output_modalities: ["text"] }
      });
      void postRealtimeTrace("input", "Prompt sent to stable Realtime agent", { text: clean });
    }

    function requestAgentFloor(reason) {
      if (realtimeActivationMode === "sleeping") setRealtimeAgentActivationMode("active", "floor granted");
      if (realtimeState !== "connected") {
        ensureRealtimeConnected("floor requested while disconnected");
        return;
      }
      clearAnalysisTimers();
      remoteAudio.muted = false;
      beginRealtimeResponse("speak");
      void postMeetingEvent({
        id: newEventId("floor"),
        type: "agent.floor",
        stream: "conversation",
        meetingId,
        createdAt: nowIso(),
        agentId: realtimeAgentId,
        granted: true,
        mode: "speak",
        note: reason || undefined
      });
      sendRealtimeEvent({
        type: "response.create",
        response: {
          output_modalities: ["audio"],
          instructions: [
            "The host granted you the floor.",
            reason ? `Your current raised-hand reason is: ${reason}` : "Speak about the most useful proposal or issue you detected recently.",
            "Speak concisely and only about your current proposal or the most useful thing you noticed in the recent conversation.",
            "Keep it to at most two short sentences unless the user explicitly asks for more.",
            "If you have no meaningful contribution, say so briefly."
          ].join("\n")
        }
      });
      void postRealtimeTrace("agent", "Floor granted to stable Realtime agent", undefined);
    }

    function requestAgentTextFloor(mode, reason) {
      if (realtimeActivationMode === "sleeping") setRealtimeAgentActivationMode("active", "text floor granted");
      if (realtimeState !== "connected") {
        ensureRealtimeConnected("text floor requested while disconnected");
        return;
      }
      clearAnalysisTimers();
      beginRealtimeResponse("silent");
      void postMeetingEvent({
        id: newEventId("floor"),
        type: "agent.floor",
        stream: "conversation",
        meetingId,
        createdAt: nowIso(),
        agentId: realtimeAgentId,
        granted: true,
        mode: mode === "work" || mode === "review" ? mode : "show",
        note: reason
      });
      sendRealtimeEvent({
        type: "response.create",
        response: {
          output_modalities: ["text"],
          instructions: [
            "The host asked you to respond in the UI as text, not audio.",
            "This path is for Codex/pi-agent results, work review, and visual show-and-tell.",
            "Do not speak audio.",
            "Call read_meeting_context and inspect piAgent.messages, piAgent.raisedHands, currentCanvas, and implementationQueue.",
            reason ? `The current raised-hand reason is: ${reason}` : "",
            "Post a concise text response. If there is a visual result to show, use post_meeting_markdown with surface=canvas.",
            "Keep the status text short unless the user explicitly asks for more detail."
          ].filter(Boolean).join("\n")
        }
      });
      void postRealtimeTrace("agent", "Text floor granted to stable Realtime agent", { mode });
    }

    function scheduleSilentAnalysis(trigger) {
      if (realtimeState !== "connected" || !realtimeMuted || realtimeActivationMode === "sleeping") return;
      if (analysisTimer !== null) window.clearTimeout(analysisTimer);
      analysisTimer = window.setTimeout(() => {
        analysisTimer = null;
        void requestSilentAnalysis(trigger);
      }, 1800);
    }

    function scheduleLiveSilentAnalysis(trigger) {
      if (realtimeState !== "connected" || !realtimeMuted || realtimeActivationMode === "sleeping") return;
      if (liveAnalysisTimer !== null) return;
      liveAnalysisTimer = window.setTimeout(() => {
        liveAnalysisTimer = null;
        void requestSilentAnalysis(trigger);
      }, 2600);
    }

    async function requestSilentAnalysis(trigger) {
      if (realtimeState !== "connected" || !realtimeMuted || realtimeActivationMode === "sleeping") return;
      const now = Date.now();
      if (now - lastAnalysisAt < 6000) return;
      lastAnalysisAt = now;
      beginRealtimeResponse("silent");
      sendRealtimeEvent({
        type: "response.create",
        response: {
          output_modalities: ["text"],
          instructions: [
            "You are in silent background-listener mode.",
            "Analyze the recent conversation turns.",
            "Do not speak audio.",
            "The current canvas is first-class context, not a side document.",
            "If you need current state, call read_meeting_context first.",
            "Durable smart artifacts belong to pi-agent, not the Realtime conversation agent.",
            "If durable artifact work is needed, create a visible implementation task if helpful, then call run_codex_task with your concise handoff for pi-agent.",
            "Be eager to use run_codex_task when the conversation asks for diagrams, architecture, project plans, documentation, code changes, repo improvements, or durable artifacts.",
            "If there is nothing useful to contribute right now, respond with exactly NO_ACTION.",
            "If you have something useful, prefer silent actions: message_pi_agent, deliver_assistant_output, post_meeting_markdown, create_meeting_task, publish_task_result, raise_meeting_hand, run_shell_command, or run_codex_task.",
            "Use message_pi_agent when you need quick back-and-forth with pi-agent; ask one concise question or request at a time and expect pi-agent to answer through meeting_message_voice_agent.",
            "Maintain a living meeting document on the main canvas with post_meeting_markdown using surface=canvas and documentId=realtime-live-canvas.",
            "Raise your hand with requestedMode=speak only for Realtime conversation contributions that should be spoken aloud.",
            "Keep any text response to at most one short sentence."
          ].join("\n")
        }
      });
      await postRealtimeTrace("agent", "Silent analysis requested from stable shell", { trigger });
    }

    function clearAnalysisTimers() {
      if (analysisTimer !== null) {
        window.clearTimeout(analysisTimer);
        analysisTimer = null;
      }
      if (liveAnalysisTimer !== null) {
        window.clearTimeout(liveAnalysisTimer);
        liveAnalysisTimer = null;
      }
    }

    function sendFollowupResponse() {
      if (realtimeActivationMode === "sleeping") return;
      sendRealtimeEvent({
        type: "response.create",
        response: {
          output_modalities: realtimeResponseMode === "speak" ? ["audio"] : ["text"]
        }
      });
    }

    function shouldCreateRealtimeResponse() {
      return realtimeActivationMode === "active" && !realtimeMuted;
    }

    function isLikelyPrompt(text) {
      return /(?:\?|\b(?:agent|assistant|codex|pi-agent|hey|please|can you|could you|would you|show|open|create|update|fix|look|help)\b)/i.test(String(text || "").trim());
    }

    function decideRealtimeWake(transcriptText) {
      const elapsed = Date.now() - lastRealtimeWakeAt;
      if (Number.isFinite(elapsed) && elapsed >= 0 && elapsed < 2500) return { shouldWake: false, reason: "debounced" };
      if (!isLikelyPrompt(transcriptText)) return { shouldWake: false, reason: "not_prompt" };
      return { shouldWake: true, reason: "prompt_detected" };
    }

    function realtimeActivationLabel() {
      return realtimeActivationMode === "sleeping" ? "sleeping until prompted" : "active";
    }

    function baseRealtimeMode() {
      return realtimeMuted || realtimeActivationMode === "sleeping" ? "silent" : "speak";
    }

    function restoreRealtimeBaseMode() {
      beginRealtimeResponse(baseRealtimeMode());
      remoteAudio.muted = realtimeMuted;
    }

    function beginRealtimeResponse(mode) {
      assistantDraft = "";
      assistantDraftMessageId = null;
      realtimeResponseMode = mode;
      publishShellState();
    }

    function responseModeFromEvent(event) {
      const response = event.response && typeof event.response === "object" ? event.response : {};
      const modalities = Array.isArray(response.output_modalities) ? response.output_modalities.map(String) : [];
      if (modalities.includes("audio")) return "speak";
      if (modalities.includes("text")) return "silent";
      return undefined;
    }

    function scheduleAssistantDraftPersist() {
      if (assistantDraftFlushTimer !== null) return;
      assistantDraftFlushTimer = window.setTimeout(() => {
        assistantDraftFlushTimer = null;
        void persistAssistantDraft();
      }, 450);
    }

    async function persistAssistantDraft() {
      const text = assistantDraft.trim();
      if (!text || text === "NO_ACTION") return;
      if (directVoiceTurnActive) return;
      if (!assistantDraftMessageId) assistantDraftMessageId = newEventId("msg");
      await postMeetingEvent({
        id: assistantDraftMessageId,
        type: "agent.message",
        stream: "conversation",
        meetingId,
        createdAt: nowIso(),
        agentId: realtimeAgentId,
        format: "markdown",
        surface: "status",
        lifecycle: "draft",
        streaming: true,
        text
      });
    }

    async function persistRealtimeTranscriptDelta(event) {
      const itemId = String(event.item_id || "");
      const delta = String(event.delta || "");
      if (!itemId || !delta) return;
      const nextText = `${transcriptDraftText.get(itemId) || ""}${delta}`;
      transcriptDraftText.set(itemId, nextText);
      const draftId = transcriptDraftIds.get(itemId) || newEventId("utp");
      transcriptDraftIds.set(itemId, draftId);
      await postMeetingEvent({
        id: draftId,
        type: "utterance.partial",
        stream: "conversation",
        meetingId,
        createdAt: nowIso(),
        speakerId: "room",
        speakerLabel: "Room (Realtime)",
        text: nextText,
        startMs: Date.now() % 3600000
      });
      if (nextText.trim().length >= 120) scheduleLiveSilentAnalysis("user_turn_live");
    }

    async function persistRealtimeTranscriptCompleted(event) {
      const itemId = String(event.item_id || "");
      const transcriptText = String(event.transcript || transcriptDraftText.get(itemId) || "").trim();
      if (!transcriptText) return;
      transcriptDraftIds.delete(itemId);
      transcriptDraftText.delete(itemId);
      const now = Date.now();
      await postMeetingEvent({
        id: newEventId("utt"),
        type: "utterance.final",
        stream: "conversation",
        meetingId,
        createdAt: nowIso(),
        speakerId: "room",
        speakerLabel: "Room (Realtime)",
        text: transcriptText,
        startMs: now % 3600000,
        endMs: (now % 3600000) + 1
      });
    }

    function connectEventStream() {
      if (eventsSource) return;
      eventsSource = new EventSource(`${api}/events/stream`);
      eventsSource.addEventListener("meeting", (message) => {
        let event;
        try {
          event = JSON.parse(message.data);
        } catch {
          return;
        }
        if (usesLocalSpeechOutput() && isSpeakableCodexDraft(event)) {
          handleCodexStreamingSpeech(event);
          return;
        }
        if (usesLocalSpeechOutput() && isSpeakableCodexFinal(event) && finalizeCodexStreamingSpeech(event)) {
          return;
        }
        if (isPiAgentReviewEvent(event) || (usesLocalSpeechOutput() && isLocalSpeakablePiAgentMessage(event))) {
          if (usesRealtimeVoice() && realtimeState === "connected") {
            void notifyRealtimeOfPiAgentUpdate(event);
          } else if (usesLocalSpeechOutput()) {
            void handleLocalPiAgentUpdate(event);
          }
        }
      });
      eventsSource.onerror = () => {
        eventsSource?.close();
        eventsSource = null;
        window.setTimeout(connectEventStream, 2000);
      };
    }

    function startLocalSttCapture(stream) {
      if (localSttActive) return;
      const audioTracks = stream?.getAudioTracks?.() || [];
      if (!audioTracks.length) return;
      localSttStream = new MediaStream(audioTracks);
      localSttActive = true;
      startLocalVadLoop();
      void postRealtimeTrace("agent", "Local STT capture started in stable shell", { provider: speechProvider, voiceMode });
      renderStatus();
      publishShellState();
    }

    function startLocalVadLoop() {
      const AudioContextCtor = window.AudioContext || window.webkitAudioContext;
      if (!AudioContextCtor || !localSttStream) {
        void postRealtimeTrace("error", "Local VAD is unavailable in this browser");
        return;
      }
      localSttAudioContext = new AudioContextCtor();
      localSttAnalyser = localSttAudioContext.createAnalyser();
      localSttAnalyser.fftSize = 1024;
      localSttAnalysisData = new Uint8Array(localSttAnalyser.fftSize);
      localSttAudioSource = localSttAudioContext.createMediaStreamSource(localSttStream);
      localSttAudioSource.connect(localSttAnalyser);
      scheduleLocalVadTick();
    }

    function scheduleLocalVadTick() {
      if (!localSttActive) return;
      if (localSttVadTimer !== null) window.clearTimeout(localSttVadTimer);
      localSttVadTimer = window.setTimeout(runLocalVadTick, 80);
    }

    function runLocalVadTick() {
      localSttVadTimer = null;
      if (!localSttActive || !localSttStream) return;
      if (!localSttStream.getAudioTracks().some((track) => track.readyState === "live")) {
        stopLocalSttCapture();
        return;
      }
      const now = Date.now();
      if (localSttPausedForSpeech) {
        const level = currentLocalMicLevel();
        const canInterrupt = now - localSpeechStartedAt >= localBargeInGraceMs();
        if (localAcousticBargeInEnabled() && canInterrupt && localSpeechAudioPlaying() && level >= localBargeInThreshold()) {
          if (!localSpeechBargeInStartedAt) localSpeechBargeInStartedAt = now;
          if (now - localSpeechBargeInStartedAt >= localBargeInHoldMs()) {
            interruptLocalSpeechForBargeIn(level);
          }
        } else {
          localSpeechBargeInStartedAt = 0;
        }
        localSttSuppressUploadsUntil = Math.max(localSttSuppressUploadsUntil, now + 450);
        if (localSttRecorder?.state === "recording") stopLocalSpeechRecorder({ discard: true });
        scheduleLocalVadTick();
        return;
      }
      if (localPushToTalkActive) {
        if (!localSttRecorder || localSttRecorder.state === "inactive") startLocalSpeechRecorder();
        if (localSttRecorder?.state === "recording" && now - localSttRecorderStartedAt >= localSpeechMaxMs()) {
          stopLocalPushToTalk();
        }
        scheduleLocalVadTick();
        return;
      }
      if (localCaptureMode() === "push-to-talk") {
        scheduleLocalVadTick();
        return;
      }
      if (now < localSttSuppressUploadsUntil) {
        if (localSttRecorder?.state === "recording") stopLocalSpeechRecorder({ discard: true });
        scheduleLocalVadTick();
        return;
      }
      const level = currentLocalMicLevel();
      const speaking = level >= localVoiceThreshold();
      if (speaking) {
        localSttLastVoiceAt = now;
        if (!localSttRecorder || localSttRecorder.state === "inactive") startLocalSpeechRecorder();
      }
      if (localSttRecorder?.state === "recording") {
        const elapsedMs = now - localSttRecorderStartedAt;
        const silenceMs = now - localSttLastVoiceAt;
        if ((elapsedMs >= 450 && silenceMs >= localSpeechSilenceMs()) || elapsedMs >= localSpeechMaxMs()) {
          stopLocalSpeechRecorder({ discard: false });
        }
      }
      scheduleLocalVadTick();
    }

    function startLocalSpeechRecorder() {
      if (!localSttStream || localSttRecorder?.state === "recording") return;
      const mimeType = preferredMimeType();
      const recorder = new MediaRecorder(localSttStream, mimeType ? { mimeType } : undefined);
      const chunks = [];
      const startedAt = Date.now();
      localSttRecorderStartedAt = startedAt;
      localSttLastVoiceAt = startedAt;
      recorder.ondataavailable = (event) => {
        if (event.data.size > 0) chunks.push(event.data);
      };
      recorder.onstop = () => {
        const discard = localSttDiscardCurrentChunk || Date.now() < localSttSuppressUploadsUntil;
        localSttDiscardCurrentChunk = false;
        localSttRecorder = null;
        localSttRecorderStartedAt = 0;
        if (discard) {
          void postRealtimeTrace("debug", "Dropped local STT chunk during local speech output", { chunks: chunks.length });
        } else if (chunks.length > 0) {
          const blob = new Blob(chunks, { type: recorder.mimeType || mimeType || "audio/webm" });
          void sendAudioChunk(blob, startedAt);
        }
      };
      recorder.onerror = (event) => {
        void postRealtimeTrace("error", "Local STT recorder failed", { error: String(event?.error?.message || event?.type || event) });
      };
      recorder.start();
      localSttRecorder = recorder;
    }

    function stopLocalSpeechRecorder(options = {}) {
      if (options.discard) localSttDiscardCurrentChunk = true;
      if (localSttRecorder?.state === "recording") localSttRecorder.stop();
    }

    function startLocalPushToTalk() {
      if (!joined || !usesLocalStt()) return;
      if (!localSttActive && localStream) startLocalSttCapture(localStream);
      if (!localSttStream || localPushToTalkActive) return;
      localPushToTalkActive = true;
      if (localSttPausedForSpeech) stopLocalSpeechForManualInput();
      localSttSuppressUploadsUntil = 0;
      if (!localSttRecorder || localSttRecorder.state === "inactive") startLocalSpeechRecorder();
      renderStatus("recording; release Space to send", "speaking");
      publishShellState();
    }

    function stopLocalPushToTalk(options = {}) {
      if (!localPushToTalkActive) return;
      localPushToTalkActive = false;
      const elapsedMs = localSttRecorderStartedAt ? Date.now() - localSttRecorderStartedAt : 0;
      stopLocalSpeechRecorder({ discard: Boolean(options.discard) || elapsedMs < 200 });
      renderStatus();
      publishShellState();
    }

    function handleLocalPushToTalkKeyDown(event) {
      if (event.code !== "Space" || event.repeat || isEditableEventTarget(event.target)) return;
      if (!joined || !usesLocalStt()) return;
      event.preventDefault();
      startLocalPushToTalk();
    }

    function handleLocalPushToTalkKeyUp(event) {
      if (event.code !== "Space" || isEditableEventTarget(event.target)) return;
      if (!joined || !usesLocalStt()) return;
      event.preventDefault();
      stopLocalPushToTalk();
    }

    function stopLocalSpeechForManualInput() {
      localSpeechGeneration += 1;
      localSttPausedForSpeech = false;
      localSpeechStartedAt = 0;
      localSpeechBargeInStartedAt = 0;
      stopLocalSpeechAudio();
      void postRealtimeTrace("agent", "Local voice speech interrupted by push-to-talk", undefined);
    }

    function isEditableEventTarget(target) {
      const element = target instanceof Element ? target : null;
      if (!element) return false;
      const tagName = element.tagName.toLowerCase();
      return tagName === "input" || tagName === "textarea" || tagName === "select" || element.isContentEditable;
    }

    function stopLocalSttCapture(options = {}) {
      localSttActive = false;
      localPushToTalkActive = false;
      if (options.suppressUploads) {
        localSttDiscardCurrentChunk = true;
        localSttSuppressUploadsUntil = Math.max(localSttSuppressUploadsUntil, Date.now() + Number(options.suppressMs || 1600));
      }
      if (localSttChunkTimer !== null) {
        window.clearTimeout(localSttChunkTimer);
        localSttChunkTimer = null;
      }
      if (localSttVadTimer !== null) {
        window.clearTimeout(localSttVadTimer);
        localSttVadTimer = null;
      }
      stopLocalSpeechRecorder({ discard: Boolean(options.suppressUploads) });
      localSttAudioSource?.disconnect();
      localSttAudioContext?.close?.().catch(() => undefined);
      localSttAudioSource = null;
      localSttAnalyser = null;
      localSttAnalysisData = null;
      localSttAudioContext = null;
      localSttRecorder = null;
      localSttStream = null;
      renderStatus();
      publishShellState();
    }

    function currentLocalMicLevel() {
      if (!localSttAnalyser || !localSttAnalysisData) return 0;
      localSttAnalyser.getByteTimeDomainData(localSttAnalysisData);
      let sum = 0;
      for (const value of localSttAnalysisData) {
        const centered = (value - 128) / 128;
        sum += centered * centered;
      }
      return Math.sqrt(sum / localSttAnalysisData.length);
    }

    function localVoiceThreshold() {
      return 0.018;
    }

    function localBargeInThreshold() {
      return Math.max(0.045, localVoiceThreshold() * 2.5);
    }

    function localBargeInGraceMs() {
      return 700;
    }

    function localBargeInHoldMs() {
      return 240;
    }

    function localAcousticBargeInEnabled() {
      return localStorage.getItem("meeting.localAcousticBargeIn") === "true";
    }

    function localCaptureMode() {
      return localStorage.getItem("meeting.localCaptureMode") === "auto-vad" ? "auto-vad" : "push-to-talk";
    }

    function localSpeechSilenceMs() {
      const configured = Number(localStorage.getItem("meeting.localSpeechSilenceMs") || "900");
      return Number.isFinite(configured) ? Math.max(450, Math.min(3000, configured)) : 900;
    }

    function localSpeechMaxMs() {
      return 22000;
    }

    async function sendAudioChunk(blob, clientStartedAt = 0) {
      if (Date.now() < localSttSuppressUploadsUntil) {
        await postRealtimeTrace("debug", "Skipped local STT upload during local speech output", { bytes: blob.size });
        return;
      }
      const extension = blob.type.includes("mp4") ? "mp4" : "webm";
      try {
        const params = new URLSearchParams({
          extension,
          speaker: "Host",
          client: "stable-vad-v1"
        });
        if (clientStartedAt) params.set("clientStartedAt", String(clientStartedAt));
        await fetch(`${api}/audio/chunk?${params.toString()}`, {
          method: "POST",
          headers: { "Content-Type": blob.type || "application/octet-stream" },
          body: await blob.arrayBuffer()
        });
      } catch (error) {
        await postRealtimeTrace("error", "Local STT audio chunk failed", { error: error?.message || String(error) });
      }
    }

    async function handleLocalPiAgentUpdate(event) {
      if (realtimeMuted) return;
      const message = localSpeechTextForPiAgentUpdate(event);
      if (!message) return;
      enqueueLocalVoiceMessage(message, { clearExisting: isVoiceAgentDirectMessage(event) });
      await postRealtimeTrace("agent", "Queued local TTS for Pi/Codex message", { eventId: event.id, direct: isVoiceAgentDirectMessage(event) });
    }

    function enqueueLocalVoiceMessage(message, options = {}) {
      const text = clipText(String(message || "").trim(), options.maxChars || 360);
      if (!text || realtimeMuted) return;
      if (options.clearExisting) clearLocalSpeechQueue();
      localSpeechQueue.push(text);
      void drainLocalSpeechQueue();
    }

    async function drainLocalSpeechQueue() {
      if (localSpeechQueueDraining) return;
      localSpeechQueueDraining = true;
      try {
        while (localSpeechQueue.length && joined && usesLocalSpeechOutput() && !realtimeMuted) {
          const next = localSpeechQueue.shift();
          if (!next) continue;
          await speakLocalVoiceMessage(next);
        }
      } finally {
        localSpeechQueueDraining = false;
      }
    }

    function clearLocalSpeechQueue() {
      localSpeechQueue = [];
      codexStreamingSpeech.clear();
    }

    async function speakLocalVoiceMessage(message) {
      localSpeechGeneration += 1;
      const generation = localSpeechGeneration;
      const text = clipText(message, 360);
      pauseLocalSttForSpeech();
      stopLocalSpeechAudio();
      renderStatus("preparing local voice", "speaking");
      try {
        if (localStreamingTts) {
          try {
            await playLocalSpeechStream(text, generation);
            return;
          } catch (error) {
            if (generation !== localSpeechGeneration) return;
            stopLocalSpeechAudio();
            await postRealtimeTrace("error", "Streaming local TTS failed; falling back to full audio response", { error: error?.message || String(error), provider: localTtsProvider });
          }
        }
        await synthesizeAndPlayLocalSpeechBlob(text, generation);
      } catch (error) {
        if (generation !== localSpeechGeneration) return;
        await postRealtimeTrace("error", "Local TTS failed; browser speech fallback is disabled", { error: error?.message || String(error) });
        renderStatus("local TTS unavailable; speech skipped", "ready");
        resumeLocalSttAfterSpeech();
      }
    }

    async function synthesizeAndPlayLocalSpeechBlob(text, generation) {
      const response = await fetch(`${api}/tts/synthesize`, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ text })
      });
      if (generation !== localSpeechGeneration) return;
      if (!response.ok) {
        const body = await response.text();
        throw new Error(body || `local TTS returned ${response.status}`);
      }
      const blob = await response.blob();
      if (generation !== localSpeechGeneration) return;
      await playLocalSpeechBlob(blob, generation);
    }

    async function playLocalSpeechStream(text, generation) {
      stopLocalSpeechAudio();
      const controller = new AbortController();
      const response = await fetch(`${api}/tts/stream`, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ text }),
        signal: controller.signal
      });
      if (generation !== localSpeechGeneration) {
        controller.abort();
        return;
      }
      if (!response.ok || !response.body) {
        const body = await response.text().catch(() => "");
        throw new Error(body || `streaming local TTS returned ${response.status}`);
      }

      const sampleRate = Number(response.headers.get("x-tts-sample-rate") || "24000") || 24000;
      const playback = createLocalSpeechStreamPlayback(sampleRate);
      playback.abortController = controller;
      localSpeechStreamPlayback = playback;
      renderStatus("local voice streaming", "speaking");

      const reader = response.body.getReader();
      const decoder = new TextDecoder();
      let pending = "";
      let audioChunks = 0;
      try {
        await playback.context.resume();
        while (generation === localSpeechGeneration) {
          const { done, value } = await reader.read();
          if (done) break;
          pending += decoder.decode(value, { stream: true }).replace(/\r\n/g, "\n");
          let separator = pending.indexOf("\n\n");
          while (separator >= 0) {
            const block = pending.slice(0, separator);
            pending = pending.slice(separator + 2);
            const audioData = speechAudioDataFromSseBlock(block);
            if (audioData) {
              schedulePcmFloat32Speech(audioData, sampleRate, playback);
              audioChunks += 1;
            }
            separator = pending.indexOf("\n\n");
          }
        }
        if (pending.trim()) {
          const audioData = speechAudioDataFromSseBlock(pending);
          if (audioData) {
            schedulePcmFloat32Speech(audioData, sampleRate, playback);
            audioChunks += 1;
          }
        }
      } finally {
        reader.releaseLock();
      }

      if (!audioChunks) {
        if (localSpeechStreamPlayback === playback) localSpeechStreamPlayback = null;
        playback.stop();
        throw new Error("streaming local TTS produced no audio chunks");
      }
      await waitForStreamingSpeechTail(playback, generation);
      if (localSpeechStreamPlayback === playback) localSpeechStreamPlayback = null;
      playback.stop();
      if (generation === localSpeechGeneration) resumeLocalSttAfterSpeech();
    }

    function playLocalSpeechBlob(blob, generation) {
      return new Promise((resolve) => {
        stopLocalSpeechAudio();
        const url = URL.createObjectURL(blob);
        const audio = new Audio(url);
        localSpeechAudio = audio;
        localSpeechAudioUrl = url;
        let finished = false;
        const finish = () => {
          if (finished) return;
          finished = true;
          if (generation === localSpeechGeneration) resumeLocalSttAfterSpeech();
          if (localSpeechAudio === audio) {
            localSpeechAudio = null;
            localSpeechAudioUrl = null;
          }
          if (localSpeechFinishCurrent === finish) localSpeechFinishCurrent = null;
          URL.revokeObjectURL(url);
          resolve();
        };
        localSpeechFinishCurrent = finish;
        audio.onended = finish;
        audio.onerror = finish;
        renderStatus("local voice speaking", "speaking");
        void audio.play().catch((error) => {
          void postRealtimeTrace("error", "Local TTS playback failed", { error: error?.message || String(error) });
          finish();
        });
      });
    }

    function createLocalSpeechStreamPlayback(sampleRate) {
      const AudioContextCtor = window.AudioContext || window.webkitAudioContext;
      if (!AudioContextCtor) throw new Error("WebAudio is unavailable in this browser");
      const context = new AudioContextCtor({ sampleRate });
      const playback = {
        context,
        nextStart: 0,
        playing: true,
        sources: new Set(),
        stop() {
          playback.playing = false;
          playback.abortController?.abort();
          for (const source of playback.sources) {
            try {
              source.stop();
            } catch {}
          }
          playback.sources.clear();
          void context.close().catch(() => undefined);
        }
      };
      playback.nextStart = context.currentTime + 0.035;
      return playback;
    }

    function speechAudioDataFromSseBlock(block) {
      const lines = String(block || "").split("\n").map((line) => line.replace(/\r$/, ""));
      const dataLines = lines.filter((line) => line.startsWith("data:")).map((line) => line.slice(5).trimStart());
      const rawData = (dataLines.length ? dataLines.join("\n") : lines.join("\n")).trim();
      if (!rawData || rawData === "[DONE]") return "";
      try {
        const parsed = JSON.parse(rawData);
        const payload = parsed?.data && typeof parsed.data === "object" ? parsed.data : parsed;
        if (payload?.type === "speech.audio.done" || parsed?.event === "speech.audio.done") return "";
        if (payload?.audio_data && (payload.type === "speech.audio.delta" || parsed?.event === "speech.audio.delta" || !payload.type)) {
          return String(payload.audio_data);
        }
      } catch {}
      return "";
    }

    function schedulePcmFloat32Speech(base64Audio, sampleRate, playback) {
      const samples = pcmFloat32FromBase64(base64Audio);
      if (!samples.length || !playback.playing) return;
      const audioBuffer = playback.context.createBuffer(1, samples.length, sampleRate);
      audioBuffer.copyToChannel(samples, 0);
      const source = playback.context.createBufferSource();
      source.buffer = audioBuffer;
      source.connect(playback.context.destination);
      source.onended = () => playback.sources.delete(source);
      playback.sources.add(source);
      const startAt = Math.max(playback.nextStart, playback.context.currentTime + 0.015);
      source.start(startAt);
      playback.nextStart = startAt + audioBuffer.duration;
    }

    function pcmFloat32FromBase64(base64Audio) {
      const binary = window.atob(base64Audio);
      const bytes = new Uint8Array(binary.length);
      for (let index = 0; index < binary.length; index += 1) {
        bytes[index] = binary.charCodeAt(index);
      }
      const sampleCount = Math.floor(bytes.byteLength / 4);
      const view = new DataView(bytes.buffer, bytes.byteOffset, bytes.byteLength);
      const samples = new Float32Array(sampleCount);
      for (let index = 0; index < sampleCount; index += 1) {
        samples[index] = view.getFloat32(index * 4, true);
      }
      return samples;
    }

    async function waitForStreamingSpeechTail(playback, generation) {
      while (generation === localSpeechGeneration && playback.playing && playback.context.currentTime < playback.nextStart + 0.08) {
        await waitMs(35);
      }
    }

    function waitMs(ms) {
      return new Promise((resolve) => window.setTimeout(resolve, ms));
    }

    function localSpeechAudioPlaying() {
      return Boolean(localSpeechStreamPlayback?.playing || (localSpeechAudio && !localSpeechAudio.paused && !localSpeechAudio.ended));
    }

    function stopLocalSpeechAudio() {
      if (localSpeechStreamPlayback) {
        localSpeechStreamPlayback.stop();
        localSpeechStreamPlayback = null;
      }
      if (localSpeechFinishCurrent) {
        const finish = localSpeechFinishCurrent;
        localSpeechFinishCurrent = null;
        finish();
      }
      if (localSpeechAudio) {
        localSpeechAudio.pause();
        localSpeechAudio.removeAttribute("src");
        localSpeechAudio.load();
        localSpeechAudio = null;
      }
      if (localSpeechAudioUrl) {
        URL.revokeObjectURL(localSpeechAudioUrl);
        localSpeechAudioUrl = null;
      }
    }

    function pauseLocalSttForSpeech() {
      if (localSpeechResumeTimer !== null) {
        window.clearTimeout(localSpeechResumeTimer);
        localSpeechResumeTimer = null;
      }
      localSttPausedForSpeech = true;
      localSpeechStartedAt = Date.now();
      localSpeechBargeInStartedAt = 0;
      localSttSuppressUploadsUntil = Math.max(localSttSuppressUploadsUntil, Date.now() + 900);
      if (localSttRecorder?.state === "recording") stopLocalSpeechRecorder({ discard: true });
      renderStatus(localAcousticBargeInEnabled() ? "local voice speaking; listening for interruption" : "local voice speaking; mic guarded", "speaking");
      publishShellState();
    }

    function resumeLocalSttAfterSpeech() {
      localSttSuppressUploadsUntil = Math.max(localSttSuppressUploadsUntil, Date.now() + 650);
      if (localSpeechResumeTimer !== null) window.clearTimeout(localSpeechResumeTimer);
      localSpeechResumeTimer = window.setTimeout(() => {
        localSpeechResumeTimer = null;
        if (!localSttPausedForSpeech) return;
        localSttPausedForSpeech = false;
        localSpeechStartedAt = 0;
        localSpeechBargeInStartedAt = 0;
        if (joined && localStream && usesLocalStt()) startLocalSttCapture(localStream);
      }, 700);
    }

    function interruptLocalSpeechForBargeIn(level) {
      localSpeechGeneration += 1;
      clearLocalSpeechQueue();
      localSttPausedForSpeech = false;
      localSpeechStartedAt = 0;
      localSpeechBargeInStartedAt = 0;
      localSttSuppressUploadsUntil = Math.max(localSttSuppressUploadsUntil, Date.now() + 220);
      stopLocalSpeechAudio();
      if (localSttRecorder?.state === "recording") stopLocalSpeechRecorder({ discard: true });
      renderStatus("local voice interrupted; listening", "ready");
      publishShellState();
      void postRealtimeTrace("agent", "Local voice speech interrupted by mic activity", { level });
    }

    async function notifyRealtimeOfPiAgentUpdate(event) {
      if (event.id === lastPiAgentNoticeId || realtimeState !== "connected" || realtimeActivationMode === "sleeping") return;
      lastPiAgentNoticeId = event.id;
      const directVoiceMessage = isVoiceAgentDirectMessage(event);
      const context = directVoiceMessage ? await readRealtimeMeetingContext().catch(() => undefined) : undefined;
      sendRealtimeTextMessage(formatPiAgentUpdateForRealtime(event, context));
      await postRealtimeTrace("agent", "Pi-agent update injected into stable Realtime agent", { eventId: event.id, type: event.type, muted: realtimeMuted });
      if (directVoiceMessage) {
        directVoiceTurnActive = true;
        directVoiceTurnToolCalled = false;
        beginRealtimeResponse("silent");
        sendRealtimeEvent({
          type: "response.create",
          response: {
            output_modalities: ["text"],
            instructions: [
              "This is a direct Pi/Codex message addressed to you, the Realtime voice agent.",
              "Treat it as one agent-to-agent dialogue turn, not as a host-facing announcement.",
              "Use the injected recent direct-dialogue JSONL as authoritative shared memory; continue from it instead of restarting.",
              "If the message expects a reply or is part of an active back-and-forth protocol, call message_pi_agent exactly once with the next concise turn.",
              "Do not answer an internal Pi/Codex turn as plain assistant text; use message_pi_agent for the reply.",
              "If the exchange is complete, if the message says stop, or if no reply is needed, respond exactly NO_ACTION.",
              "Do not speak audio for this internal turn. Do not use canvas, artifact, or markdown tools.",
              "For counting or turn-taking tests, send only the next required token/number and preserve the stop condition."
            ].join("\n")
          }
        });
        return;
      }
      if (!realtimeMuted) {
        beginRealtimeResponse("speak");
        sendRealtimeEvent({
          type: "response.create",
          response: {
            output_modalities: ["audio"],
            instructions: [
              "A pi-agent/Codex update was just injected into your conversation context.",
              "Speak one concise sentence only if the update is useful for the host right now.",
              "Mention that Codex/pi-agent produced or updated the UI/artifact if that is what happened.",
              "Do not read long content aloud. Do not create durable artifacts."
            ].join("\n")
          }
        });
        return;
      }
      beginRealtimeResponse("silent");
      sendRealtimeEvent({
        type: "response.create",
        response: {
          output_modalities: ["text"],
          instructions: [
            "A pi-agent/Codex update was just injected into your conversation context.",
            "Do not speak audio now.",
            "If the result is useful to show or explain, call raise_meeting_hand with requestedMode=show or requestedMode=review and a concise reason.",
            "Never use requestedMode=speak for Codex/pi-agent output; Codex speaks through text in the UI.",
            "If there is nothing to add, respond with exactly NO_ACTION.",
            "Do not create durable artifacts; pi-agent owns durable artifacts."
          ].join("\n")
        }
      });
    }

    function isPiAgentReviewEvent(event) {
      if (!event || event.agentId !== piAgentId) return false;
      if (event.type === "agent.hand_raise") return true;
      if (event.type !== "agent.message" || event.lifecycle !== "final") return false;
      const text = String(event.text || "").trim();
      if (!text || /^(ok|okay|noted|thanks|you.?re welcome|i.?m here|received|got it|understood)[.!]*$/i.test(text)) return false;
      if (event.surface === "status" && !event.documentId && event.stream !== "implementation") return false;
      return event.surface === "canvas" || event.stream === "implementation" || Boolean(event.documentId);
    }

    function isSpeakableCodexDraft(event) {
      if (!event || event.agentId !== piAgentId || event.type !== "agent.message") return false;
      if (event.lifecycle !== "draft" || event.streaming !== true) return false;
      if (event.surface !== "status" || isVoiceAgentDirectMessage(event)) return false;
      return Boolean(String(event.text || "").trim());
    }

    function isSpeakableCodexFinal(event) {
      if (!event || event.agentId !== piAgentId || event.type !== "agent.message") return false;
      if (event.lifecycle !== "final" || event.surface !== "status" || isVoiceAgentDirectMessage(event)) return false;
      return Boolean(codexStreamingSpeech.has(streamingSpeechKey(event)));
    }

    function handleCodexStreamingSpeech(event) {
      if (realtimeMuted) return;
      const key = streamingSpeechKey(event);
      const speech = markdownToSpeech(String(event.text || ""));
      if (!speech) return;
      const state = codexStreamingSpeech.get(key) || { consumed: 0, lastSpeech: "", queued: 0 };
      if (state.lastSpeech && !speech.startsWith(state.lastSpeech.slice(0, Math.min(state.lastSpeech.length, state.consumed)))) {
        state.consumed = Math.max(0, commonPrefixLength(state.lastSpeech, speech));
      }
      state.lastSpeech = speech;
      const available = speech.slice(state.consumed);
      const extraction = extractSpeakableSegments(available, false);
      for (const segment of extraction.segments) {
        enqueueLocalVoiceMessage(segment.text, { maxChars: 260 });
        state.queued += 1;
      }
      state.consumed += extraction.consumed;
      codexStreamingSpeech.set(key, state);
    }

    function finalizeCodexStreamingSpeech(event) {
      const key = streamingSpeechKey(event);
      const state = codexStreamingSpeech.get(key);
      if (!state) return false;
      const speech = markdownToSpeech(String(event.text || ""));
      const available = speech.slice(Math.min(state.consumed, speech.length));
      const extraction = extractSpeakableSegments(available, true);
      for (const segment of extraction.segments) {
        enqueueLocalVoiceMessage(segment.text, { maxChars: 300 });
        state.queued += 1;
      }
      if (!state.queued && speech) {
        enqueueLocalVoiceMessage(clipText(speech, 300));
      }
      codexStreamingSpeech.delete(key);
      return true;
    }

    function streamingSpeechKey(event) {
      return String(event.id || event.documentId || "pi-agent-stream");
    }

    function extractSpeakableSegments(text, final) {
      const segments = [];
      let cursor = 0;
      const source = String(text || "");
      while (cursor < source.length) {
        const rest = source.slice(cursor);
        const leading = rest.length - rest.trimStart().length;
        const slice = rest.slice(leading);
        if (!slice.trim()) break;
        const boundary = findSpeechBoundary(slice, final);
        if (boundary < 0) break;
        const raw = slice.slice(0, boundary).trim();
        const end = leading + boundary;
        if (isUsefulSpeechSegment(raw)) segments.push({ text: raw, end });
        cursor += end;
      }
      return { segments, consumed: cursor };
    }

    function findSpeechBoundary(text, final) {
      const normalized = String(text || "");
      const sentence = /[.!?](?=\s|$)/g;
      let match;
      while ((match = sentence.exec(normalized))) {
        const end = match.index + 1;
        if (end >= 45 || final) return end;
      }
      if (!final && normalized.length > 220) {
        const soft = Math.max(normalized.lastIndexOf(",", 220), normalized.lastIndexOf(";", 220), normalized.lastIndexOf(":", 220));
        if (soft >= 90) return soft + 1;
        const space = normalized.lastIndexOf(" ", 220);
        if (space >= 120) return space;
      }
      if (final && normalized.trim().length >= 18) return normalized.length;
      return -1;
    }

    function isUsefulSpeechSegment(text) {
      const segment = String(text || "").trim();
      if (segment.length < 12) return false;
      if (!/[a-z0-9]/i.test(segment)) return false;
      if (/^(code block|markdown|json|yaml)$/i.test(segment)) return false;
      return true;
    }

    function commonPrefixLength(a, b) {
      const limit = Math.min(String(a).length, String(b).length);
      let index = 0;
      while (index < limit && a[index] === b[index]) index += 1;
      return index;
    }

    function isLocalSpeakablePiAgentMessage(event) {
      if (!event || event.agentId !== piAgentId) return false;
      if (event.type === "agent.hand_raise") return true;
      if (event.type !== "agent.message" || event.lifecycle !== "final") return false;
      const text = String(event.text || "").trim();
      if (!text || /^(ok|okay|noted|thanks|you.?re welcome|i.?m here)[.!]*$/i.test(text)) return false;
      return event.surface === "status" || event.surface === "canvas" || Boolean(event.documentId);
    }

    function isVoiceAgentDirectMessage(event) {
      return event?.type === "agent.message" && String(event.documentId || "").startsWith("voice-message:");
    }

    function parseVoiceAgentEnvelope(text) {
      const result = {};
      for (const line of String(text || "").split(/\r?\n/)) {
        const match = /^(Intent|Message|When):\s*(.*)$/i.exec(line.trim());
        if (!match) continue;
        result[match[1].toLowerCase()] = match[2].trim();
      }
      return result;
    }

    function localSpeechTextForPiAgentUpdate(event) {
      if (event?.type === "agent.hand_raise") return clipText(String(event.reason || "I have a suggestion."), 240);
      if (!event || event.type !== "agent.message") return "";
      if (isVoiceAgentDirectMessage(event)) {
        const envelope = parseVoiceAgentEnvelope(String(event.text || ""));
        return clipText(envelope.message || String(event.text || "").trim(), 360);
      }
      const speech = markdownToSpeech(String(event.text || ""));
      if (!speech) return "";
      if (event.surface === "canvas" || event.documentId) return clipText(`I updated the canvas. ${firstSpeechSentence(speech)}`, 300);
      return clipText(speech, 360);
    }

    function markdownToSpeech(text) {
      return String(text || "")
        .replace(/```[\s\S]*?```/g, " code block ")
        .replace(/`([^`]+)`/g, "$1")
        .replace(/!\[[^\]]*\]\([^)]*\)/g, " image ")
        .replace(/\[([^\]]+)\]\([^)]*\)/g, "$1")
        .replace(/^#{1,6}\s*/gm, "")
        .replace(/^[\s>*-]+/gm, "")
        .replace(/\s+/g, " ")
        .trim();
    }

    function firstSpeechSentence(text) {
      const normalized = String(text || "").trim();
      const match = /^(.{20,220}?[.!?])\s/.exec(normalized);
      return match ? match[1] : clipText(normalized, 220);
    }

    function formatPiAgentUpdateForRealtime(event, context) {
      if (isVoiceAgentDirectMessage(event)) {
        const dialogueJsonl = formatAgentDialogueJsonlForRealtime(context);
        return [
          "Direct Pi/Codex message for the Realtime voice agent.",
          "This is an agent-to-agent dialogue turn. Continue with message_pi_agent only if a reply is needed.",
          "Do not speak to the host unless explicitly asked; keep internal replies in the Pi coordination channel.",
          "",
          "kind: voice_agent_message",
          `documentId: ${event.documentId}`,
          "",
          dialogueJsonl ? "Recent direct dialogue JSONL (authoritative shared memory):" : "",
          dialogueJsonl,
          dialogueJsonl ? "" : "",
          "Current Pi/Codex message:",
          clipText(String(event.text || ""), 3000)
        ].filter((line) => line !== "").join("\n");
      }

      const lines = [
        "Direct Pi/Codex update for the Realtime voice agent.",
        "Treat this as first-class current meeting context. The UI/canvas may already show the artifact or response.",
        "If unmuted, you may briefly tell the host what changed. If muted, raise a hand for show/review only when useful.",
        ""
      ];
      if (event.type === "agent.hand_raise") {
